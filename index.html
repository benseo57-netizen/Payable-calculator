<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payable Rate 통합 전략 시뮬레이터</title>
  
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #F0F4F8;
      font-family: 'Apple SD Gothic Neo', Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    button { outline: none; }

    /* 반응형 레이아웃 그리드 */
    .main-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .sheet2-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .sheet3-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .sheet4-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    @media (max-width: 950px) {
      .main-grid, .sheet2-grid, .sheet3-grid, .sheet4-grid {
        grid-template-columns: 1fr !important;
      }
    }
  </style>

  <script>
    // 우클릭 방지
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    // F12, 개발자도구 차단
    document.addEventListener('keydown', function(e) {
      if (e.keyCode === 123 || 
         (e.ctrlKey && e.shiftKey && e.keyCode === 73) || 
         (e.ctrlKey && e.shiftKey && e.keyCode === 74) || 
         (e.ctrlKey && e.keyCode === 85)) { 
        e.preventDefault();
      }
    });
  </script>  
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useContext, createContext } = React;

    const FxCtx = createContext({ openId: null, setOpenId: () => {} });
    const LI_CONV = 1 / 0.188;  
    const f0 = n => (n == null || isNaN(n) || !isFinite(n)) ? "—" : Math.round(n).toLocaleString("ko-KR");
    const f1 = n => (n == null || isNaN(n) || !isFinite(n)) ? "—" : n.toFixed(1);
    const fp = (n, d=0) => (n == null || isNaN(n) || !isFinite(n)) ? "—" : n.toFixed(d) + "%";
    const fa = n => (n == null || isNaN(n) || !isFinite(n)) ? "—" : (n / 1e8).toFixed(2) + "억";
    const num = v => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };

    const C = {
      bg: "#F0F4F8", card: "#FFFFFF", border: "#CBD5E1", amber: "#B45309", blue: "#1D4ED8",
      green: "#065F46", red: "#B91C1C", purple: "#6D28D9", navy: "#0F172A", text: "#0F172A",
      muted: "#475569", dim: "#94A3B8", vdim: "#CBD5E1", headerBg: "#0F172A", headerText: "#F8FAFC",
      secBg: "#F8FAFC", highlightBg: "#FFFBEB", accentBg: "#EFF6FF"
    };

    function Sec({ label, color }) {
      return (
        <div style={{ padding:"6px 12px", marginTop:8, fontSize:12, fontWeight:700,
          letterSpacing:"0.07em", color:color||C.amber,
          borderLeft:"3px solid "+(color||C.amber), background:"#F8FAFC",
          borderBottom:"1px solid "+C.border }}>
          {label}
        </div>
      );
    }

    function Fx({ id, text }) {
      const { openId, setOpenId } = useContext(FxCtx);
      const open = openId === id;
      return (
        <span style={{ display:"inline-flex", alignItems:"center", marginLeft:4, position:"relative" }}>
          <button onClick={e => { e.stopPropagation(); setOpenId(open ? null : id); }}
            style={{ fontSize:11, padding:"0 5px", borderRadius:3, cursor:"pointer",
              background:open?"#1E293B":"#E2E8F0", color:open?"#F0F9FF":"#475569",
              border:"1px solid "+(open?"#1E3A8A":C.border) }}>fx</button>
          {open && (
            <span onClick={e => e.stopPropagation()}
              style={{ position:"absolute", top:"100%", left:0, zIndex:50, marginTop:4,
                background:"#1E293B", border:"1px solid #334155", borderRadius:6,
                padding:"7px 10px", fontSize:12, color:"#E2E8F0", width:260,
                whiteSpace:"pre-wrap", lineHeight:1.7, boxShadow:"0 4px 20px rgba(0,0,0,0.25)" }}>
              {text}
            </span>
          )}
        </span>
      );
    }

    function IRow({ label, value, onChange, unit, note, accent, highlight, formula }) {
      return (
        <div style={{ display:"flex", alignItems:"flex-start", gap:4,
          padding:"6px 10px", borderBottom:"1px solid "+C.border,
          background:highlight?"#FFFBEB":accent?"#EFF6FF":"#FFFFFF" }}>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:"flex", alignItems:"center", flexWrap:"wrap", gap:2, position:"relative" }}>
              <span style={{ fontSize:13, color:C.text, fontWeight:500 }}>{label}</span>
              {formula && <Fx id={label+unit} text={formula} />}
            </div>
            {note && <div style={{ fontSize:11, color:C.muted, marginTop:2, whiteSpace:"pre-line" }}>{note}</div>}
          </div>
          <input type="number" step="any" value={value} onClick={e=>e.stopPropagation()} onChange={e => onChange(e.target.value)}
            style={{ width:88, padding:"3px 7px", fontSize:14, textAlign:"right", fontWeight:700,
              background:"#FFFFFF", color:"#0F172A", border:"1.5px solid #94A3B8",
              borderRadius:4, outline:"none", flexShrink:0 }} />
          <div style={{ width:44, fontSize:11, color:C.dim, textAlign:"right", flexShrink:0, paddingTop:2 }}>{unit}</div>
        </div>
      );
    }

    function CRow({ label, value, unit, bold, color, sub, formula }) {
      const col = color||(bold?C.green:"#94A3B8");
      return (
        <div style={{ display:"flex", alignItems:"flex-start", gap:4,
          padding:"5px 10px", borderBottom:"1px solid "+C.border,
          background:bold?"#ECFDF5":"transparent" }}>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:"flex", alignItems:"center", flexWrap:"wrap", gap:2, position:"relative" }}>
              <span style={{ fontSize:13, color:bold?"#065F46":C.text, fontWeight:bold?700:400 }}>{label}</span>
              {formula && <Fx id={label+unit} text={formula} />}
            </div>
            {sub && <div style={{ fontSize:11, color:C.muted, marginTop:1 }}>{sub}</div>}
          </div>
          <div style={{ fontSize:bold?14:12, fontWeight:bold?700:500, color:col, minWidth:88, textAlign:"right", flexShrink:0 }}>{value}</div>
          <div style={{ width:44, fontSize:11, color:C.dim, textAlign:"right", flexShrink:0, paddingTop:2 }}>{unit}</div>
        </div>
      );
    }

    function LL({ text }) {
      return (
        <div style={{ margin:"10px 0 0", padding:"5px 12px", fontSize:11,
          fontWeight:700, color:"#FFFFFF", letterSpacing:"0.1em", textTransform:"uppercase",
          background:"#334155" }}>
          {text}
        </div>
      );
    }

    class Sheet3Boundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      render() {
        if (this.state.hasError) {
          return (
            <div style={{ padding:40, textAlign:"center", color:"#B91C1C" }}>
              <div style={{ fontSize:18, fontWeight:700, marginBottom:12 }}>⚠ 3시트 렌더 오류</div>
              <div style={{ fontSize:13, background:"#F8FAFC", padding:16, borderRadius:8, textAlign:"left" }}>{String(this.state.error)}</div>
              <button onClick={() => this.setState({ hasError:false, error:null })} style={{ marginTop:16, padding:"8px 20px" }}>다시 시도</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function ChCalcBlock({ inp, c }) {
      const er2    = num(inp.exchangeRate);
      const niSO4P = num(inp.niSO4Price) / 1000 * er2;
      const coSO4P = num(inp.coSO4Price) / 1000 * er2;
      const liCO3P = num(inp.liCO3Price) > 0 ? num(inp.liCO3Price) / 1000 * er2 : c.liP;
      const pr2    = c.pr;
      const niC2   = num(inp.chNiContent || inp.niContent) / 100;
      const coC2   = num(inp.chCoContent || inp.coContent) / 100;
      const liC2   = num(inp.chLiContent || inp.liContent) / 100;
      const niChKg = niC2 * pr2 * (num(inp.niChPay)/100) * (niSO4P / 0.22);
      const coChKg = coC2 * pr2 * (num(inp.coChPay)/100) * (coSO4P / 0.205);
      const liChKg = liC2 * LI_CONV * pr2 * (num(inp.liChPay)/100) * liCO3P;
      const totalCh = niChKg + coChKg + liChKg;
      const chEquiv = c.totContained > 0 ? Math.round(totalCh / c.totContained * 10000) / 100 : NaN;
      const hasInput = num(inp.niChPay)>0 || num(inp.coChPay)>0 || num(inp.liChPay)>0;
      
      return (
        <div style={{ padding:"12px 14px", background: hasInput ? "#EFF6FF" : "#F8FAFC" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: hasInput ? 10 : 0 }}>
            <div>
              <div style={{ fontSize:11, color:C.muted, marginBottom:3 }}>{"중국 총지급액"}</div>
              <div style={{ fontSize:20, fontWeight:800, color:C.text }}>{hasInput ? f0(totalCh)+" ₩/kg" : "—"}</div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:13, fontWeight:700, color:C.blue }}>{"우리 기준 CoNiLi Rate 환산"}</div>
              <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{"총지급액 per 전체 함량가치"}</div>
              <span style={{ fontSize:28, fontWeight:800, color: !hasInput ? C.dim : C.blue }}>
                {hasInput && !isNaN(chEquiv) ? fp(chEquiv) : "—"}
              </span>
            </div>
          </div>
          {hasInput && (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6 }}>
              {[
                { label:"Ni 기여", val:niChKg, color:"#1D4ED8" },
                { label:"Co 기여", val:coChKg, color:C.amber },
                { label:"Li 기여", val:liChKg, color:C.green },
              ].map((item,i) => (
                <div key={i} style={{ padding:"6px 8px", background:"#EFF6FF", borderRadius:6, border:"1px solid #DBEAFE" }}>
                  <div style={{ fontSize:11, color:C.muted }}>{item.label}</div>
                  <div style={{ fontSize:13, fontWeight:700, color:item.color }}>{f0(item.val)}{" ₩/kg"}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function Sheet3Tab({ inp, s, s3Slots, setS3Slots, s3Name, setS3Name, s3AutoTarget, setS3AutoTarget }) {
      const er3  = num(inp.exchangeRate);
      const coP3 = num(inp.coUSD) * 2.20462 * er3;
      const niP3 = num(inp.niUSD) / 1000 * er3;
      const liP3 = num(inp.liUSD) * er3;
      const pr3  = num(inp.powderRatio) / 100;
      const coC3 = num(inp.coContent) / 100;
      const niC3 = num(inp.niContent) / 100;
      const liC3 = num(inp.liContent) / 100;
      const cor3 = num(inp.coRecovery) / 100;
      const nir3 = num(inp.niRecovery) / 100;
      const lir3 = num(inp.liRecovery) / 100;

      const coCont3   = coC3 * pr3 * coP3;
      const niCont3   = niC3 * pr3 * niP3;
      const liCont3   = liC3 * LI_CONV * pr3 * liP3;
      const coNiCont3 = coCont3 + niCont3;
      const totCont3  = coNiCont3 + liCont3;

      const coOut3  = coC3 * pr3 * cor3;
      const niOut3  = niC3 * pr3 * nir3;
      const liOut3  = liC3 * LI_CONV * pr3 * lir3;
      const totOut3 = coOut3*coP3 + niOut3*niP3 + liOut3*liP3;
      const tgtMarginAmt3 = totOut3 * (num(inp.targetMargin)/100);

      const wetTotal3  = coOut3*num(inp.coWetCost) + niOut3*num(inp.niWetCost) + liOut3*num(inp.liWetCost);
      const preTreat3  = num(inp.preProcessCost);
      const logistics3 = num(inp.localLogistics);
      const intl3      = num(inp.intlLogistics) * pr3;
      const krLocal3   = num(inp.krLocalLogistics) * pr3;
      const calcin3    = num(inp.calcinationCost) * pr3;
      const other3     = num(inp.otherVarCost);
      const byproduct3 = num(inp.byproductRevenue);
      const totVar3    = wetTotal3 + preTreat3 + logistics3 + intl3 + krLocal3 + calcin3 + other3 - byproduct3;
      const maxPay3    = totOut3 - totVar3 - tgtMarginAmt3;

      const tgtCoNi3 = num(inp.s3TargetCoNi);
      const pool3    = coNiCont3 * (tgtCoNi3 / 100);
      const cnliA3   = totCont3 > 0 ? Math.round(tgtCoNi3 * (coNiCont3/totCont3)) : 0;
      const cmA3     = maxPay3 - pool3;

      // 3시트: 자동 역산 메탈 분기 로직
      let finalCoPay3 = num(inp.s3CoPay);
      let finalNiPay3 = num(inp.s3NiPay);
      let finalLiPay3 = num(inp.s3LiPay);

      const coPmt3_temp = coCont3 * (num(inp.s3CoPay) / 100);
      const niPmt3_temp = niCont3 * (num(inp.s3NiPay) / 100);
      const liPmt3_temp = liCont3 * (num(inp.s3LiPay) / 100);

      if (s3AutoTarget === "ni") {
        const niPmt3 = pool3 - coPmt3_temp - liPmt3_temp;
        finalNiPay3 = niCont3 > 0 ? (niPmt3 / niCont3) * 100 : 0;
      } else if (s3AutoTarget === "co") {
        const coPmt3 = pool3 - niPmt3_temp - liPmt3_temp;
        finalCoPay3 = coCont3 > 0 ? (coPmt3 / coCont3) * 100 : 0;
      } else if (s3AutoTarget === "li") {
        const liPmt3 = pool3 - coPmt3_temp - niPmt3_temp;
        finalLiPay3 = liCont3 > 0 ? (liPmt3 / liCont3) * 100 : 0;
      }

      const niNeg3 = finalNiPay3 < 0 || finalCoPay3 < 0 || finalLiPay3 < 0;
      const totPmt3 = (coCont3 * finalCoPay3/100) + (niCont3 * finalNiPay3/100) + (liCont3 * finalLiPay3/100);
      const cmB3   = maxPay3 - totPmt3;
      const trueMarginPct3 = totOut3 > 0 ? (cmB3 / totOut3) * 100 : 0;

      const saveS3 = (idx) => {
        if(!s3Name.trim()) { alert("시나리오명을 입력해주세요."); return; }
        let n = [...s3Slots];
        n[idx] = { name: s3Name, coPay: finalCoPay3, niPay: finalNiPay3, liPay: finalLiPay3, cmB3: cmB3, trueMarginPct3: trueMarginPct3 };
        setS3Slots(n); setS3Name("");
      };

      const loadS3 = (idx) => {
        if(!s3Slots[idx]) return;
        s("s3CoPay")(s3Slots[idx].coPay.toFixed(1));
        s("s3NiPay")(s3Slots[idx].niPay.toFixed(1));
        s("s3LiPay")(s3Slots[idx].liPay.toFixed(1));
      };

      return (
        <div>
          <div className="sheet3-grid">
            {/* 왼쪽 */}
            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              <div style={{ background:C.card, borderRadius:10, border:"1px solid "+C.border, overflow:"hidden" }}>
                <Sec label="① 원료 조건 — 1시트 자동 연동" color={C.blue} />
                <CRow label="Co 환산가" value={f0(coP3)} unit="₩/kg" color={C.amber} sub={"Co "+inp.coUSD+"$/lb × 2.20462 × "+inp.exchangeRate} />
                <CRow label="Ni 환산가" value={f0(niP3)} unit="₩/kg" color={C.blue} sub={"Ni "+inp.niUSD+"$/ton ÷ 1,000 × "+inp.exchangeRate} />
                <CRow label="Li₂CO₃ 환산가" value={f0(liP3)} unit="₩/kg" color={C.green} sub={"Li₂CO₃ "+inp.liUSD+"$/kg × "+inp.exchangeRate} />
                <CRow label="분말화비율" value={inp.powderRatio+"%"} unit="" sub="스크랩->BM 전환율" />
                <CRow label="Co / Ni / Li 함량" value={inp.coContent+"% / "+inp.niContent+"% / "+inp.liContent+"%"} unit="" />
                <CRow label="Co / Ni / Li 회수율" value={inp.coRecovery+"% / "+inp.niRecovery+"% / "+inp.liRecovery+"%"} unit="" />
                <CRow label="목표 마진율" value={inp.targetMargin+"%"} unit="" color={C.purple} sub={"목표마진 금액: "+f0(tgtMarginAmt3)+"₩/kg"} />
              </div>
              <div style={{ background:C.card, borderRadius:10, border:"1px solid "+C.border, overflow:"hidden" }}>
                <Sec label="② 가공비 — 1시트 자동 연동" color={C.purple} />
                <CRow label="Co 습식가공비" value={f0(num(inp.coWetCost))} unit="₩/kg-Co" color={C.purple} />
                <CRow label="Ni 습식가공비" value={f0(num(inp.niWetCost))} unit="₩/kg-Ni" color={C.purple} />
                <CRow label="Li 습식가공비" value={f0(num(inp.liWetCost))} unit="₩/kg-Li" color={C.purple} />
                <CRow label="전처리 가공비" value={f0(num(inp.preProcessCost))} unit="₩/kg-스크랩" color={C.purple} />
                <CRow label="로컬 물류비" value={f0(num(inp.localLogistics))} unit="₩/kg-스크랩" color={C.purple} />
                <CRow label="국제 운임/소성 등 합계" value={f0(intl3 + krLocal3 + calcin3 + other3)} unit="₩/kg-스크랩" color={C.purple} />
                <CRow label="비용 합계 (부산물 차감 후)" value={f0(totVar3)} unit="₩/kg-스크랩" color={C.red} bold sub={"습식 + 전처리 + 물류 등 - 부산물"} />
              </div>
            </div>

            {/* 가운데 */}
            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              <div style={{ background:C.card, borderRadius:10, border:"1px solid "+C.border, overflow:"hidden" }}>
                <Sec label="③ 원재료 내 함량가치" color={C.green} />
                <CRow label="Co 함량가치" value={f0(coCont3)} unit="₩/kg" color={C.amber} />
                <CRow label="Ni 함량가치" value={f0(niCont3)} unit="₩/kg" color={C.blue} />
                <CRow label="Li₂CO₃ 함량가치" value={f0(liCont3)} unit="₩/kg" color={C.green} />
                <CRow label="Co+Ni 함량가치" value={f0(coNiCont3)} unit="₩/kg" bold color={C.blue} />
                <CRow label="전체 함량가치"  value={f0(totCont3)}  unit="₩/kg" bold color={C.green} />
                <div style={{ background:"#0F172A", padding:"10px 14px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <div>
                      <div style={{ fontSize:12, color:"#94A3B8", fontWeight:600 }}>최대 허용 매입단가</div>
                      <div style={{ fontSize:10, color:"#475569" }}>Output {f0(totOut3)} - 비용 {f0(totVar3)}</div>
                    </div>
                    <span style={{ fontSize:20, fontWeight:800, color:"#FCD34D" }}>{f0(maxPay3)} ₩/kg</span>
                  </div>
                </div>
              </div>

              <div style={{ background:C.card, borderRadius:10, border:"1px solid "+C.border, overflow:"hidden" }}>
                <Sec label="④ 목표 배분 풀 (지급 Pool)" color={C.amber} />
                <div style={{ padding:"12px 14px", background:"#FFFBEB", borderBottom:"1px solid "+C.border }}>
                  <div style={{ fontSize:11, color:C.amber, fontWeight:700, marginBottom:8 }}>상대방 제시 CoNi 지불률 (또는 목표치)</div>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                    <input type="number" value={inp.s3TargetCoNi} onChange={e => s("s3TargetCoNi")(e.target.value)} onClick={e=>e.stopPropagation()}
                      style={{ width:80, fontSize:26, fontWeight:800, textAlign:"center", border:"2px solid "+C.amber, borderRadius:8, padding:"6px", background:"#FFFFFF", color:C.text }} />
                    <span style={{ fontSize:22, fontWeight:800, color:C.amber }}>%</span>
                  </div>
                  <div style={{ fontSize:11, color:C.muted }}>총 지급 풀 = <b style={{ color:C.amber, fontSize:13 }}>{f0(pool3)} ₩/kg</b></div>
                </div>
                
                {/* 메탈 자동 역산 선택 */}
                <div style={{ padding:"12px 14px", background:"#EFF6FF", borderBottom:"1px solid "+C.border }}>
                  <div style={{ fontSize:12, fontWeight:700, color:C.blue, marginBottom:6 }}>🔄 자동 역산 메탈 선택 (잔여 풀 배분 대상)</div>
                  <div style={{ display:"flex", gap:15, fontSize:13 }}>
                    <label style={{ cursor:"pointer", fontWeight:s3AutoTarget==="ni"?700:400, color:s3AutoTarget==="ni"?C.blue:C.text }}>
                      <input type="radio" checked={s3AutoTarget === "ni"} onChange={() => setS3AutoTarget("ni")} style={{marginRight:4}} /> Ni 자동
                    </label>
                    <label style={{ cursor:"pointer", fontWeight:s3AutoTarget==="co"?700:400, color:s3AutoTarget==="co"?C.amber:C.text }}>
                      <input type="radio" checked={s3AutoTarget === "co"} onChange={() => setS3AutoTarget("co")} style={{marginRight:4}} /> Co 자동
                    </label>

    function App() {
      const [tab, setTab] = useState(0);
      const [fxId, setFxId] = useState(null);
      const [chShow, setChShow] = useState(false);

      const [tgtMode, setTgtMode] = useState("CoNi"); 
      const [tgtVal, setTgtVal]   = useState("90");

      const [s1Slots, setS1Slots] = useState(Array(5).fill(null));
      const [s1Name, setS1Name] = useState("");
      const [s3Slots, setS3Slots] = useState(Array(5).fill(null));
      const [s3Name, setS3Name] = useState("");
      const [s3AutoTarget, setS3AutoTarget] = useState("ni");

      const [inp, setInp] = useState({
        exchangeRate:"1530.11", coUSD:"25.53", niUSD:"17650", liUSD:"22.50",
        dealVolume:"100", powderRatio:"100",
        coContent:"2.57", niContent:"29.39", liContent:"4.16",
        coRecovery:"95", niRecovery:"95", liRecovery:"90",
        coWetCost:"13300", niWetCost:"11700", liWetCost:"9450",
        preProcessCost:"0", localLogistics:"0", intlLogistics:"0", krLocalLogistics:"0",
        calcinationCost:"0", otherVarCost:"0", byproductRevenue:"0", targetMargin:"0",
        marketRatioCoNi:"105", marketRatioCoNiLi:"0",
        niSO4Price:"0", coSO4Price:"0", liCO3Price:"0",
        niChPay:"0", coChPay:"0", liChPay:"0", chNiContent:"", chCoContent:"", chLiContent:"",
        s3TargetCoNi:"88", s3CoPay:"15", s3NiPay:"20", s3LiPay:"20",
        s4OurEr:"1340", s4PowderRatio:"100", s4CoContent:"3.0", s4NiContent:"25.0", s4LiContent:"3.384",
        s4CoRecovery:"95", s4NiRecovery:"95", s4LiRecovery:"90", s4CoWetUSD:"8.96", s4NiWetUSD:"7.31", s4LiWetUSD:"6.87",
      });

      const s = k => v => setInp(p => ({ ...p, [k]: v }));

      // 1시트 연산
      const er  = num(inp.exchangeRate);
      const coP = num(inp.coUSD) * 2.20462 * er;  
      const niP = (num(inp.niUSD) / 1000) * er;
      const liP = num(inp.liUSD) * er;
      const pr  = num(inp.powderRatio) / 100;
      const cor = num(inp.coRecovery) / 100;
      const nir = num(inp.niRecovery) / 100;
      const lir = num(inp.liRecovery) / 100;
      const coC = num(inp.coContent) / 100;
      const niC = num(inp.niContent) / 100;
      const liC = num(inp.liContent) / 100;
      
      const coOut = coC * pr * cor;
      const niOut = niC * pr * nir;
      const liOut = liC * LI_CONV * pr * lir;
      const coVal = coOut * coP;
      const niVal = niOut * niP;
      const liVal = liOut * liP;
      const totOut  = coVal + niVal + liVal;

      const coContained  = coC * pr * coP;
      const niContained  = niC * pr * niP;
      const liContained  = liC * LI_CONV * pr * liP;
      const coNiContained  = coContained + niContained;
      const totContained   = coContained + niContained + liContained;
      
      const wetTotal = coOut * num(inp.coWetCost) + niOut * num(inp.niWetCost) + liOut * num(inp.liWetCost);
      const preV    = num(inp.preProcessCost);
      const localV  = num(inp.localLogistics);
      const intlV   = num(inp.intlLogistics);
      const krV     = num(inp.krLocalLogistics);
      const calcV   = num(inp.calcinationCost);
      const otherV  = num(inp.otherVarCost);
      const byproduct = num(inp.byproductRevenue);
      const totVar      = preV + wetTotal + localV + intlV*pr + krV*pr + calcV*pr + otherV;
      
      const tgtMarginAmt = totOut * (num(inp.targetMargin) / 100);
      const payable      = totOut - totVar + byproduct - tgtMarginAmt;
      
      const ratioCoNi   = coNiContained > 0 ? (payable / coNiContained) * 100 : NaN;
      const ratioCoNiLi = totContained > 0 ? (payable / totContained) * 100 : NaN;
      
      const mktCoNi     = num(inp.marketRatioCoNi);
      const marketPrice = coNiContained * (mktCoNi / 100);
      const trueMarginAmt = totOut - totVar + byproduct - marketPrice;
      const trueMarginPct = totOut > 0 ? (trueMarginAmt / totOut) * 100 : 0;
      
      const qtyKg = num(inp.dealVolume) * 1000;
      const totalPayoutKRW = marketPrice * qtyKg;
      const totalMarginKRW = trueMarginAmt * qtyKg;

      const c = {
        coP, niP, liP, pr, coOut, niOut, liOut, coVal, niVal, liVal, totOut,
        coContained, niContained, liContained, coNiContained, totContained,
        wetTotal, preV, localV, intlV, krV, calcV, otherV, byproduct, totVar,
        payable, tgtMarginAmt, ratioCoNi, ratioCoNiLi,
        mktCoNi, marketPrice, trueMarginAmt, trueMarginPct, totalPayoutKRW, totalMarginKRW
      };

      // 2시트 연산
      const tgtNum = num(tgtVal);
      const tgtPayable = tgtMode === "CoNi" ? c.coNiContained * (tgtNum / 100) : c.totContained * (tgtNum / 100);
      const displayCoNi = tgtMode === "CoNi" ? tgtVal : (c.totContained > 0 && c.coNiContained > 0 ? Math.round(tgtNum * c.totContained / c.coNiContained).toString() : "");
      const displayCoNiLi = tgtMode === "CoNiLi" ? tgtVal : (c.totContained > 0 && c.coNiContained > 0 ? Math.round(tgtNum * c.coNiContained / c.totContained).toString() : "");
      const numCoNi = num(displayCoNi);
      const numCoNiLi = num(displayCoNiLi);
      const allowedWet = c.totOut - tgtPayable - c.tgtMarginAmt - num(inp.preProcessCost) - num(inp.localLogistics) - num(inp.intlLogistics)*c.pr - num(inp.krLocalLogistics)*c.pr - num(inp.calcinationCost)*c.pr - num(inp.otherVarCost) + c.byproduct; 

      // 보관함 로직
      const saveS1 = (idx) => {
        if(!s1Name.trim()) { alert("보관할 딜의 이름을 입력해주세요."); return; }
        const newSlots = [...s1Slots];
        newSlots[idx] = { name: s1Name, dealVolume: inp.dealVolume, powderRatio: inp.powderRatio, coContent: inp.coContent, niContent: inp.niContent, liContent: inp.liContent, ratioCoNi: c.ratioCoNi, payable: c.payable, trueMarginPct: c.trueMarginPct, totalPayoutKRW: c.totalPayoutKRW, totalMarginKRW: c.totalMarginKRW };
        setS1Slots(newSlots); setS1Name("");
      };

      const loadS1 = (idx) => {
        const slot = s1Slots[idx];
        if(!slot) return;
        s("dealVolume")(slot.dealVolume); s("powderRatio")(slot.powderRatio);
        s("coContent")(slot.coContent); s("niContent")(slot.niContent); s("liContent")(slot.liContent);
      };

      const copyAllSummary = () => {
        let text = "━━━━ 📊 입찰 분석 결과 브리핑 ━━━━\n\n";
        let hasData = false;
        s1Slots.forEach((slot, i) => {
          if (slot) {
            hasData = true;
            text += `🔹 [${slot.name}]\n`;
            text += `  • 물량/분말화: ${slot.dealVolume}톤 / ${slot.powderRatio}%\n`;
            text += `  • 원료 함량: Co ${slot.coContent}% | Ni ${slot.niContent}% | Li ${slot.liContent}%\n`;
            text += `  • 협상 지불률: Co+Ni ${slot.ratioCoNi.toFixed(1)}%\n`;
            text += `  • 예상 단가: ${f0(slot.payable)} ₩/kg\n`;
            text += `  • 총 지불액: ${fa(slot.totalPayoutKRW)}\n`;
            text += `  • 순수 마진: ${f1(slot.trueMarginPct)}% (${fa(slot.totalMarginKRW)})\n\n`;
          }
        });
        if (!hasData) { alert("저장된 데이터가 없습니다. 먼저 딜을 저장해주세요."); return; }
        navigator.clipboard.writeText(text.trim()).then(() => alert("✅ 경영진 보고용 요약이 복사되었습니다!"));
      };

      return (
        <FxCtx.Provider value={{ openId:fxId, setOpenId:setFxId }}>
          <div onClick={() => setFxId(null)} style={{ color:C.text, paddingBottom: 50 }}>

            {/* 네비게이션 & 보고용 복사 */}
            <div style={{ padding:"14px 20px", background:C.headerBg, borderBottom:"1px solid #334155", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
              <div>
                <div style={{ fontSize:11, letterSpacing:"0.15em", color:"#94A3B8", textTransform:"uppercase" }}>PRO STRATEGY PLATFORM</div>
                <div style={{ fontSize:20, fontWeight:800, marginTop:2, color:C.headerText }}>Payable Rate 전략 시뮬레이터</div>
              </div>
              <button onClick={copyAllSummary} style={{ padding:"8px 16px", background:"#C62828", color:"#FFF", border:"none", borderRadius:6, fontWeight:700, cursor:"pointer" }}>
                📋 전체 슬롯 요약 복사 (보고용)
              </button>
            </div>

            <div style={{ display:"flex", background:"#FFFFFF", borderBottom:"2px solid "+C.border, overflowX:"auto" }}>
              {["1시트 매입 단가 계산","2시트 목표 가공비 역산","3시트 메탈별 지불률 배분","4시트 경쟁사 시뮬레이션"].map((t,i) => (
                <button key={i} onClick={() => setTab(i)}
                  style={{ padding:"12px 18px", fontSize:13, fontWeight:600, cursor:"pointer", border:"none", background:"transparent",
                    color:tab===i?C.blue:C.muted, fontWeight:tab===i?800:600, borderBottom:tab===i?"3px solid "+C.blue:"3px solid transparent", whiteSpace:"nowrap" }}>
                  {t}
                </button>
              ))}
            </div>

            <div style={{ maxWidth:1100, margin:"0 auto", padding:14 }}>

              {/* ━━━━ 1시트 ━━━━ */}
              {tab === 0 && (
                <div>
                  <div className="main-grid">
                    <div style={{ background:C.card, borderRadius:10, overflow:"hidden", border:"1px solid "+C.border }}>
                      <Sec label="1. 시장 환경 및 규모" />
                      <IRow label="환율" value={inp.exchangeRate} onChange={s("exchangeRate")} unit="₩/$" accent />
                      <IRow label="계약 물량 (Volume)" value={inp.dealVolume} onChange={s("dealVolume")} unit="ton" highlight />
                      
                      <Sec label="2. 금속 시세" color={C.blue} />
                      <IRow label="Co 시세" value={inp.coUSD} onChange={s("coUSD")} unit="$/lb" />
                      <IRow label="Ni 시세" value={inp.niUSD} onChange={s("niUSD")} unit="$/ton" />
                      <IRow label="Li₂CO₃ 시세" value={inp.liUSD} onChange={s("liUSD")} unit="$/kg" />

                      <Sec label="3. 원료 조건" color={C.blue} />
                      <IRow label="분말화비율" value={inp.powderRatio} onChange={s("powderRatio")} unit="%" />
                      <IRow label="Co 함량" value={inp.coContent} onChange={s("coContent")} unit="%" />
                      <IRow label="Ni 함량" value={inp.niContent} onChange={s("niContent")} unit="%" />
                      <IRow label="Li 함량" value={inp.liContent} onChange={s("liContent")} unit="%" />

                      <Sec label="4. 습식 회수율" color={C.blue} />
                      <IRow label="Co 회수율" value={inp.coRecovery} onChange={s("coRecovery")} unit="%" />
                      <IRow label="Ni 회수율" value={inp.niRecovery} onChange={s("niRecovery")} unit="%" />
                      <IRow label="Li 회수율" value={inp.liRecovery} onChange={s("liRecovery")} unit="%" />

                      <Sec label="5. 제조 비용" color={C.purple} />
                      <IRow label="Co 습식비" value={inp.coWetCost} onChange={s("coWetCost")} unit="₩/kg" />
                      <IRow label="Ni 습식비" value={inp.niWetCost} onChange={s("niWetCost")} unit="₩/kg" />
                      <IRow label="Li 습식비" value={inp.liWetCost} onChange={s("liWetCost")} unit="₩/kg" />
                      <IRow label="전처리비" value={inp.preProcessCost} onChange={s("preProcessCost")} unit="₩/kg" />
                      <IRow label="물류/기타비 총합" value={num(inp.localLogistics)+num(inp.intlLogistics)+num(inp.krLocalLogistics)+num(inp.calcinationCost)+num(inp.otherVarCost)} onChange={()=>{}} unit="₩/kg" note="상세 항목은 코드 내 조정 필요" />
                    </div>

                    <div style={{ background:C.card, borderRadius:10, overflow:"hidden", border:"1px solid "+C.border }}>
                      <Sec label="가치 분석 중간 집계" color="#60A5FA" />
                      <CRow label="Co+Ni 함량가치" value={f0(c.coNiContained)} unit="₩/kg" bold color="#1D4ED8" />
                      <CRow label="전체 함량가치" value={f0(c.totContained)} unit="₩/kg" bold color="#065F46" />
                      <CRow label="Output 회수가치 합계" value={f0(c.totOut)} unit="₩/kg" bold color={C.green} />

                      <Sec label="목표 상한선 지표" color={C.amber} />
                      <IRow label="기준 목표 마진율" value={inp.targetMargin} onChange={s("targetMargin")} unit="%" />
                      <CRow label="우리 최대 단가" value={f0(c.payable)} unit="₩/kg" bold color={C.red} />
                      <CRow label="최대 허용 CoNi Rate" value={fp(c.ratioCoNi)} unit="" bold color={C.amber} />
                      <CRow label="최대 허용 CoNiLi Rate" value={fp(c.ratioCoNiLi)} unit="" bold color={C.blue} />
                    </div>

                    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                      <div style={{ background:C.card, borderRadius:10, overflow:"hidden", border:"1px solid "+C.border, padding:14 }}>
                        <div style={{ fontSize:14, fontWeight:800, color:C.purple, marginBottom:12, borderBottom:"2px solid "+C.purple, paddingBottom:4 }}>최종 계약 시뮬레이션</div>
                        <IRow label="시장(협상) CoNi 지불률" value={inp.marketRatioCoNi} onChange={s("marketRatioCoNi")} unit="%" highlight />
                        
                        <div style={{ background:"#EFF6FF", borderRadius:8, padding:12, marginTop:12, textAlign:"center" }}>
                          <div style={{ fontSize:12, color:C.muted, marginBottom:4 }}>시장 지불률 적용 실제 단가</div>
                          <div style={{ fontSize:26, fontWeight:800, color:C.blue }}>{f0(c.marketPrice)} <span style={{fontSize:13}}>₩/kg</span></div>
                        </div>

                        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginTop:12 }}>
                          <div style={{ background:"#F0FDF4", padding:10, borderRadius:8, border:"1px solid #A7F3D0", textAlign:"center" }}>
                            <div style={{ fontSize:11, color:C.muted }}>단위당 순수 마진</div>
                            <div style={{ fontSize:18, fontWeight:800, color:C.green }}>{f0(c.trueMarginAmt)} ₩</div>
                          </div>
                          <div style={{ background:"#F0FDF4", padding:10, borderRadius:8, border:"1px solid #A7F3D0", textAlign:"center" }}>
                            <div style={{ fontSize:11, color:C.muted }}>실제 최종 마진율</div>
                            <div style={{ fontSize:18, fontWeight:800, color:C.green }}>{f1(c.trueMarginPct)}%</div>
                          </div>
                        </div>

                        <div style={{ background:C.navy, color:"#FFF", padding:12, borderRadius:8, marginTop:12 }}>
                          <div style={{ fontSize:12, color:C.dim, marginBottom:6 }}>총 계약 규모 분석 ({inp.dealVolume} 톤 기준)</div>
                          <div style={{ display:"flex", justifyContent:"space-between", borderBottom:"1px solid #1E293B", paddingBottom:4 }}>
                            <span style={{ fontSize:13 }}>총 지불 대금</span>
                            <span style={{ fontSize:16, fontWeight:700, color:"#FCD34D" }}>{fa(c.totalPayoutKRW)}</span>
                          </div>
                          <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
                            <span style={{ fontSize:13 }}>총 확보 수익</span>
                            <span style={{ fontSize:16, fontWeight:700, color:"#4ADE80" }}>{fa(c.totalMarginKRW)}</span>
                          </div>
                        </div>
                      </div>

                      {/* 1시트 슬롯 저장 버튼 영역 */}
                      <div style={{ background:C.card, borderRadius:10, border:"1px solid "+C.border, padding:14 }}>
                        <div style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:10 }}>💾 현재 시뮬레이션 슬롯 저장</div>
                        <input type="text" value={s1Name} onChange={e => setS1Name(e.target.value)} placeholder="원료명/입찰명 입력 (예: A사 젤리롤)" style={{ width:"100%", padding:"8px", fontSize:13, border:"1px solid "+C.border, borderRadius:4, marginBottom:10, outline:"none" }} />
                        <div style={{ display:"grid", gridTemplateColumns:"repeat(5, 1fr)", gap:6 }}>
                          {[0,1,2,3,4].map(idx => (
                            <button key={idx} onClick={() => saveS1(idx)} style={{ padding:"8px 0", fontSize:12, fontWeight:700, cursor:"pointer", background:s1Slots[idx]?"#FEF3C7":"#E2E8F0", border:"1px solid "+C.border, borderRadius:4 }}>
                              슬롯{idx+1}
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* 1시트 하단 보관함 리스트 (스왑 용도) */}
                  <div style={{ marginTop:20, background:C.card, padding:16, borderRadius:10, border:"1px solid "+C.border }}>
                    <div style={{ fontSize:15, fontWeight:800, color:C.navy, marginBottom:12, borderBottom:"2px solid "+C.border, paddingBottom:6 }}>📥 1시트 저장 보관함 리스트</div>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))", gap:10 }}>
                      {s1Slots.map((slot, idx) => (
                        <div key={idx} style={{ background:slot?"#FAFAFA":C.secBg, border:"1px solid "+C.border, borderRadius:8, padding:12 }}>
                          <div style={{ fontSize:13, fontWeight:800, color:C.blue, marginBottom:6 }}>슬롯 {idx+1} {slot ? `[${slot.name}]` : "(비어있음)"}</div>
                          {slot ? (
                            <div style={{ fontSize:12, lineHeight:1.6 }}>
                              <div>• 물량: {slot.dealVolume}톤 ({slot.powderRatio}%)</div>
                              <div>• 함량: Co{slot.coContent} Ni{slot.niContent} Li{slot.liContent}</div>
                              <div>• Rate: <span style={{color:C.amber, fontWeight:700}}>{slot.ratioCoNi.toFixed(1)}%</span></div>
                              <div>• 마진: <span style={{color:C.green, fontWeight:700}}>{slot.trueMarginPct.toFixed(1)}%</span></div>
                              <div style={{ fontWeight:800, color:C.text, marginTop:6 }}>단가: {f0(slot.payable)}원</div>
                              <button onClick={() => loadS1(idx)} style={{ width:"100%", marginTop:10, padding:"6px 0", fontSize:12, fontWeight:700, background:"#EFF6FF", color:C.blue, border:"1px solid #BFDBFE", borderRadius:4, cursor:"pointer" }}>🔄 불러오기</button>
                            </div>
                          ) : <div style={{ fontSize:12, color:C.dim, textAlign:"center", padding:"40px 0" }}>데이터 없음</div>}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* ━━━━ 2시트 ━━━━ */}
              {tab === 1 && (
                <div className="sheet2-grid">
                  <div style={{ background:C.card, borderRadius:10, overflow:"hidden", border:"1px solid "+C.border }}>
                    <Sec label="① 가공비 역산 기초 연동 지표" color={C.blue} />
                    <CRow label="Output 합계 가치" value={f0(c.totOut)} unit="₩/kg" bold />
                    <CRow label="Co+Ni 함량가치" value={f0(c.coNiContained)} unit="₩/kg" color="#1D4ED8" bold />
                    <CRow label="전체 함량가치" value={f0(c.totContained)} unit="₩/kg" />
                  </div>
                  <div style={{ background:C.card, borderRadius:10, overflow:"hidden", border:"1px solid "+C.border }}>
                    <Sec label="② 목표 가공비 역산" color={C.amber} />
                    <div style={{ padding:"14px" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                        <input type="number" step="any" value={tgtMode==="CoNi"?tgtVal:displayCoNi} onChange={e=>{setTgtMode("CoNi"); setTgtVal(e.target.value);}} style={{ width:80, padding:"10px 8px", fontSize:22, fontWeight:800, textAlign:"center", border:"2px solid "+(tgtMode==="CoNi"?"#D97706":C.border), borderRadius:8, outline:"none" }} />
                        <span style={{ fontSize:22, fontWeight:800 }}>% (Co+Ni 기준)</span>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                        <input type="number" step="any" value={tgtMode==="CoNiLi"?tgtVal:displayCoNiLi} onChange={e=>{setTgtMode("CoNiLi"); setTgtVal(e.target.value);}} style={{ width:80, padding:"10px 8px", fontSize:22, fontWeight:800, textAlign:"center", border:"2px solid "+(tgtMode==="CoNiLi"?"#1D4ED8":C.border), borderRadius:8, outline:"none" }} />
                        <span style={{ fontSize:22, fontWeight:800 }}>% (Co+Ni+Li 기준)</span>
                      </div>
                      <div style={{ marginTop:20, padding:15, background:"#F8FAFC", borderRadius:8, textAlign:"center" }}>
                        <div style={{ fontSize:14, color:C.muted }}>목표 수렴 허용 가공비 총액</div>
                        <div style={{ fontSize:30, fontWeight:800, color:allowedWet>=0?C.purple:C.red }}>{f0(allowedWet)} <span style={{fontSize:16}}>₩/kg</span></div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* ━━━━ 3시트 ━━━━ */}
              {tab === 2 && (
                <Sheet3Boundary>
                  <Sheet3Tab inp={inp} s={s} s3Slots={s3Slots} setS3Slots={setS3Slots} s3Name={s3Name} setS3Name={setS3Name} s3AutoTarget={s3AutoTarget} setS3AutoTarget={setS3AutoTarget} />
                  
                  {/* 중국 지불률 환산 모듈 */}
                  <div style={{ marginTop:14, background:C.card, borderRadius:10, border:"1px solid "+C.border, overflow:"hidden" }}>
                    <div onClick={() => setChShow(!chShow)} style={{ padding:"12px 16px", background:"#EFF6FF", cursor:"pointer", display:"flex", justifyContent:"space-between" }}>
                      <span style={{ fontSize:14, fontWeight:700, color:C.blue }}>중국 지불률 -> CoNiLi 환산 (클릭하여 펼치기)</span>
                      <span style={{ fontWeight:800 }}>{chShow ? "▲" : "▼"}</span>
                    </div>
                    {chShow && <ChCalcBlock inp={inp} c={c} />}
                  </div>
                </Sheet3Boundary>
              )}

              {/* ━━━━ 4시트 ━━━━ */}
              {tab === 3 && (
                <Sheet4Tab inp={inp} s={s} />
              )}

            </div>
          </div>
        </FxCtx.Provider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
