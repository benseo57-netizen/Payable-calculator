<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payable Rate 계산기</title>
  
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #F0F4F8;
      font-family: 'Apple SD Gothic Neo', Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    button { outline: none; }

    /* 모바일 반응형 최적화 그리드 */
    .main-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .sheet2-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .sheet3-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .sheet4-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    @media (max-width: 950px) {
      .main-grid, .sheet2-grid, .sheet3-grid, .sheet4-grid {
        grid-template-columns: 1fr !important;
      }
    }
  </style>

  <script>
    // 우클릭 방지 및 개발자 도구 차단
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    document.addEventListener('keydown', function(e) {
      if (e.keyCode === 123 || 
         (e.ctrlKey && e.shiftKey && e.keyCode === 73) || 
         (e.ctrlKey && e.shiftKey && e.keyCode === 74) || 
         (e.ctrlKey && e.keyCode === 85)) { 
        e.preventDefault();
      }
    });
  </script>  
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useContext, createContext } = React;

    const FxCtx = createContext({ openId: null, setOpenId: () => {} });
    const LI_CONV = 1 / 0.188;  
    
    const f0 = n => (n == null || isNaN(n) || !isFinite(n)) ? "—" : Math.round(n).toLocaleString("ko-KR");
    const f1 = n => (n == null || isNaN(n) || !isFinite(n)) ? "—" : n.toFixed(1);
    const fp = (n, d=0) => (n == null || isNaN(n) || !isFinite(n)) ? "—" : n.toFixed(d) + "%";
    const fa = n => (n == null || isNaN(n) || !isFinite(n)) ? "—" : (n / 1e8).toFixed(2) + "억";
    const num = v => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };

    const C = {
      bg: "#F0F4F8", card: "#FFFFFF", border: "#CBD5E1", amber: "#B45309", blue: "#1D4ED8",
      green: "#065F46", red: "#B91C1C", purple: "#6D28D9", navy: "#0F172A", text: "#0F172A",
      muted: "#475569", dim: "#94A3B8", vdim: "#CBD5E1", headerBg: "#0F172A", headerText: "#F8FAFC",
      secBg: "#F8FAFC", highlightBg: "#FFFBEB", accentBg: "#EFF6FF"
    };

    function Sec({ label, color }) {
      return (
        <div style={{ padding:"6px 12px", marginTop:8, fontSize:12, fontWeight:700,
          letterSpacing:"0.07em", color:color||C.amber,
          borderLeft:"3px solid "+(color||C.amber), background:"#F8FAFC",
          borderBottom:"1px solid "+C.border }}>
          {label}
        </div>
      );
    }

    function Fx({ id, text }) {
      const { openId, setOpenId } = useContext(FxCtx);
      const open = openId === id;
      return (
        <span style={{ display:"inline-flex", alignItems:"center", marginLeft:4, position:"relative" }}>
          <button onClick={e => { e.stopPropagation(); setOpenId(open ? null : id); }}
            style={{ fontSize:11, padding:"0 5px", borderRadius:3, cursor:"pointer",
              background:open?"#1E293B":"#E2E8F0", color:open?"#F0F9FF":"#475569",
              border:"1px solid "+(open?"#1E3A8A":C.border) }}>fx</button>
          {open && (
            <span onClick={e => e.stopPropagation()}
              style={{ position:"absolute", top:"100%", left:0, zIndex:50, marginTop:4,
                background:"#1E293B", border:"1px solid #334155", borderRadius:6,
                padding:"7px 10px", fontSize:12, color:"#E2E8F0", width:260,
                whiteSpace:"pre-wrap", lineHeight:1.7, boxShadow:"0 4px 20px rgba(0,0,0,0.25)" }}>
              {text}
            </span>
          )}
        </span>
      );
    }

    function IRow({ label, value, onChange, unit, note, accent, highlight, formula }) {
      return (
        <div style={{ display:"flex", alignItems:"flex-start", gap:4,
          padding:"6px 10px", borderBottom:"1px solid "+C.border,
          background:highlight?"#FFFBEB":accent?"#EFF6FF":"#FFFFFF" }}>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:"flex", alignItems:"center", flexWrap:"wrap", gap:2, position:"relative" }}>
              <span style={{ fontSize:13, color:C.text, fontWeight:500 }}>{label}</span>
              {formula && <Fx id={label+unit} text={formula} />}
            </div>
            {note && <div style={{ fontSize:11, color:C.muted, marginTop:2, whiteSpace:"pre-line" }}>{note}</div>}
          </div>
          <input type="number" step="any" value={value} onClick={e=>e.stopPropagation()} onChange={e => onChange(e.target.value)}
            style={{ width:88, padding:"3px 7px", fontSize:14, textAlign:"right", fontWeight:700,
              background:"#FFFFFF", color:"#0F172A", border:"1.5px solid #94A3B8",
              borderRadius:4, outline:"none", flexShrink:0 }} />
          <div style={{ width:44, fontSize:11, color:C.dim, textAlign:"right", flexShrink:0, paddingTop:2 }}>{unit}</div>
        </div>
      );
    }

    function CRow({ label, value, unit, bold, color, sub, formula }) {
      const col = color||(bold?C.green:"#94A3B8");
      return (
        <div style={{ display:"flex", alignItems:"flex-start", gap:4,
          padding:"5px 10px", borderBottom:"1px solid "+C.border,
          background:bold?"#ECFDF5":"transparent" }}>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:"flex", alignItems:"center", flexWrap:"wrap", gap:2, position:"relative" }}>
              <span style={{ fontSize:13, color:bold?"#065F46":C.text, fontWeight:bold?700:400 }}>{label}</span>
              {formula && <Fx id={label+unit} text={formula} />}
            </div>
            {sub && <div style={{ fontSize:11, color:C.muted, marginTop:1 }}>{sub}</div>}
          </div>
          <div style={{ fontSize:bold?14:12, fontWeight:bold?700:500, color:col, minWidth:88, textAlign:"right", flexShrink:0 }}>{value}</div>
          <div style={{ width:44, fontSize:11, color:C.dim, textAlign:"right", flexShrink:0, paddingTop:2 }}>{unit}</div>
        </div>
      );
    }

    function LL({ text }) {
      return (
        <div style={{ margin:"10px 0 0", padding:"5px 12px", fontSize:11,
          fontWeight:700, color:"#FFFFFF", letterSpacing:"0.1em", textTransform:"uppercase",
          background:"#334155" }}>
          {text}
        </div>
      );
    }

    function compute(inp) {
      const er  = num(inp.exchangeRate);
      const coP = num(inp.coUSD) * 2.20462 * er;  
      const niP = (num(inp.niUSD) / 1000) * er;
      const liP = num(inp.liUSD) * er;
      const pr  = num(inp.powderRatio) / 100;
      const cor = num(inp.coRecovery) / 100;
      const nir = num(inp.niRecovery) / 100;
      const lir = num(inp.liRecovery) / 100;
      const coC = num(inp.coContent) / 100;
      const niC = num(inp.niContent) / 100;
      const liC = num(inp.liContent) / 100;
      
      const coOut = coC * pr * cor;
      const niOut = niC * pr * nir;
      const liOut = liC * LI_CONV * pr * lir;
      const coVal = coOut * coP;
      const niVal = niOut * niP;
      const liVal = liOut * liP;
      const totOut  = coVal + niVal + liVal;

      const coContained  = coC * pr * coP;
      const niContained  = niC * pr * niP;
      const liContained  = liC * LI_CONV * pr * liP;
      const coNiContained  = coContained + niContained;
      const totContained   = coContained + niContained + liContained;
      
      const coNiOut = coVal + niVal;
      const wetTotal = coOut * num(inp.coWetCost) + niOut * num(inp.niWetCost) + liOut * num(inp.liWetCost);
      const preV    = num(inp.preProcessCost);
      const localV  = num(inp.localLogistics);
      const intlV   = num(inp.intlLogistics);
      const krV     = num(inp.krLocalLogistics);
      const calcV   = num(inp.calcinationCost);
      const otherV  = num(inp.otherVarCost);
      const byproduct = num(inp.byproductRevenue);
      const totVar      = preV + wetTotal + localV + intlV*pr + krV*pr + calcV*pr + otherV;
      
      const tgtMarginPct = num(inp.targetMargin) / 100;
      const tgtMarginAmt = totOut * tgtMarginPct;           
      const payable      = totOut - totVar + byproduct - tgtMarginAmt;
      const marginBase   = totOut + tgtMarginAmt;           
      
      const ratioCoNi   = coNiContained > 0 ? (payable / coNiContained) * 100 : NaN;
      const ratioCoNiLi = (coNiContained > 0 && totContained > 0)
        ? (ratioCoNi * (coNiContained / totContained)) : NaN;
      
      const mktCoNi     = num(inp.marketRatioCoNi);
      const mktCoNiLi   = num(inp.marketRatioCoNiLi);
      const marketPrice = coNiContained * (mktCoNi / 100);
      const cmKg        = payable - marketPrice;
      
      const trueMarginAmt = totOut - totVar + byproduct - marketPrice;
      const trueMarginPct = totOut > 0 ? (trueMarginAmt / totOut) * 100 : 0;
      
      const qtyKg = num(inp.dealVolume) * 1000;
      const totalPayoutKRW = marketPrice * qtyKg;
      const totalMarginKRW = trueMarginAmt * qtyKg;

      return {
        coP, niP, liP, pr, coOut, niOut, liOut,
        coVal, niVal, liVal, totOut, coNiOut,
        coContained, niContained, liContained, coNiContained, totContained,
        wetTotal, preV, localV, intlV, krV, calcV, otherV, byproduct, totVar,
        payable, tgtMarginAmt, marginBase, ratioCoNi, ratioCoNiLi,
        mktCoNi, mktCoNiLi, marketPrice, cmKg,
        trueMarginAmt, trueMarginPct, totalPayoutKRW, totalMarginKRW
      };
    }

    // ── 오리지널 통짜 App 컴포넌트 시작 ──
    function App() {
      const [tab, setTab] = useState(0);
      const [fxId, setFxId] = useState(null);
      const [chShow, setChShow] = useState(false);

      const [tgtMode, setTgtMode] = useState("CoNi"); 
      const [tgtVal, setTgtVal]   = useState("90");

      // 보관함 State
      const [s1Slots, setS1Slots] = useState(Array(5).fill(null));
      const [s1Name, setS1Name] = useState("");
      const [s3Slots, setS3Slots] = useState(Array(5).fill(null));
      const [s3Name, setS3Name] = useState("");
      const [s3AutoTarget, setS3AutoTarget] = useState("ni");

      // 4시트 경쟁사 State
      const [comps, setComps] = useState([
        { name:"", er:"1340", pct:"80" }, { name:"", er:"1340", pct:"45" }, { name:"", er:"1340", pct:"51" }
      ]);

      const [inp, setInp] = useState({
        exchangeRate:"1530.11", coUSD:"25.53", niUSD:"17650", liUSD:"22.50",
        dealVolume:"100", powderRatio:"100",
        coContent:"2.57", niContent:"29.39", liContent:"4.16",
        coRecovery:"95", niRecovery:"95", liRecovery:"90",
        coWetCost:"13300", niWetCost:"11700", liWetCost:"9450",
        preProcessCost:"0", localLogistics:"0", intlLogistics:"0", krLocalLogistics:"0",
        calcinationCost:"0", otherVarCost:"0", byproductRevenue:"0", targetMargin:"0",
        marketRatioCoNi:"105", marketRatioCoNiLi:"0", mktMode:"CoNi",
        niSO4Price:"0", coSO4Price:"0", liCO3Price:"0",
        niChPay:"0", coChPay:"0", liChPay:"0", chNiContent:"", chCoContent:"", chLiContent:"",
        s3TargetCoNi:"88", s3CoPay:"15", s3NiPay:"20", s3LiPay:"20",
        s4OurEr:"1340", s4PowderRatio:"100", s4CoContent:"3.0", s4NiContent:"25.0", s4LiContent:"3.384",
        s4CoRecovery:"95", s4NiRecovery:"95", s4LiRecovery:"90",
        s4CoWetUSD:"8.96", s4NiWetUSD:"7.31", s4LiWetUSD:"6.87",
      });

      const s = k => v => setInp(p => ({ ...p, [k]: v }));
      
      // ── 1, 2시트 공통 연산 ──
      const c = compute(inp);

      const saveS1 = (idx) => {
        if(!s1Name.trim()) { alert("저장할 이름을 입력해주세요."); return; }
        const newSlots = [...s1Slots];
        newSlots[idx] = { 
          name: s1Name, dealVolume: inp.dealVolume, powderRatio: inp.powderRatio, 
          coContent: inp.coContent, niContent: inp.niContent, liContent: inp.liContent, 
          ratioCoNi: c.ratioCoNi, payable: c.payable, trueMarginPct: c.trueMarginPct, 
          totalPayoutKRW: c.totalPayoutKRW, totalMarginKRW: c.totalMarginKRW,
          marginBase: c.marginBase, cmKg: c.cmKg
        };
        setS1Slots(newSlots); setS1Name("");
      };

      const loadS1 = (idx) => {
        const slot = s1Slots[idx];
        if(!slot) return;
        setInp(p => ({ ...p, dealVolume: slot.dealVolume, powderRatio: slot.powderRatio, 
          coContent: slot.coContent, niContent: slot.niContent, liContent: slot.liContent }));
      };

      const copyS1 = () => {
        let text = "━━━━━━━━━━━━\n📊 Payable Rate 분석 결과\n━━━━━━━━━━━━\n\n";
        text += `【 현재 시뮬레이션 중인 조건 】\n`;
        text += `  • 물량/분말화: ${inp.dealVolume}톤 / ${inp.powderRatio}%\n`;
        text += `  • 함량: Co ${inp.coContent}% | Ni ${inp.niContent}% | Li ${inp.liContent}%\n`;
        text += `  • 지불률(CoNi): ${c.ratioCoNi.toFixed(1)}%\n`;
        text += `  • 매입단가: ${f0(c.payable)} ₩/kg\n`;
        text += `  • 총 지불액: ${fa(c.totalPayoutKRW)}\n`;
        text += `  • 마진율: ${c.marginBase>0 ? (c.cmKg/c.marginBase*100).toFixed(1) : 0}% (${fa(c.totalMarginKRW)})\n\n`;

        s1Slots.forEach((slot, i) => {
          if (slot) {
            text += `【 슬롯 ${i+1}: ${slot.name} 】\n`;
            text += `  • 물량/분말화: ${slot.dealVolume}톤 / ${slot.powderRatio}%\n`;
            text += `  • 함량: Co ${slot.coContent}% | Ni ${slot.niContent}% | Li ${slot.liContent}%\n`;
            text += `  • 지불률(CoNi): ${slot.ratioCoNi.toFixed(1)}%\n`;
            text += `  • 매입단가: ${f0(slot.payable)} ₩/kg\n`;
            text += `  • 총 지불액: ${fa(slot.totalPayoutKRW)}\n`;
            text += `  • 마진율: ${slot.marginBase>0 ? (slot.cmKg/slot.marginBase*100).toFixed(1) : 0}% (${fa(slot.totalMarginKRW)})\n\n`;
          }
        });
        navigator.clipboard.writeText(text.trim()).then(() => alert("✅ 결과가 복사되었습니다."));
      };

      // ── 2시트 연산 ──
      const tgtNum = num(tgtVal);
      const tgtPayable = tgtMode === "CoNi" ? c.coNiContained * (tgtNum / 100) : c.totContained * (tgtNum / 100);
      const displayCoNi = tgtMode === "CoNi" ? tgtVal : (c.totContained > 0 && c.coNiContained > 0 ? (tgtNum * c.totContained / c.coNiContained).toFixed(1) : "");
      const displayCoNiLi = tgtMode === "CoNiLi" ? tgtVal : (c.totContained > 0 && c.coNiContained > 0 ? (tgtNum * c.coNiContained / c.totContained).toFixed(1) : "");
      
      const allowedWet = c.totOut - tgtPayable - c.tgtMarginAmt - num(inp.preProcessCost) - num(inp.localLogistics) - num(inp.intlLogistics)*c.pr - num(inp.krLocalLogistics)*c.pr - num(inp.calcinationCost)*c.pr - num(inp.otherVarCost) + c.byproduct; 

      // ── 2시트 중국 지불률 연산 ──
      const er2    = num(inp.exchangeRate);
      const niSO4P = num(inp.niSO4Price) / 1000 * er2;
      const coSO4P = num(inp.coSO4Price) / 1000 * er2;
      const liCO3P = num(inp.liCO3Price) > 0 ? num(inp.liCO3Price) / 1000 * er2 : c.liP;
      const niC2   = num(inp.chNiContent || inp.niContent) / 100;
      const coC2   = num(inp.chCoContent || inp.coContent) / 100;
      const liC2   = num(inp.chLiContent || inp.liContent) / 100;
      const niChKg = niC2 * c.pr * (num(inp.niChPay)/100) * (niSO4P / 0.22);
      const coChKg = coC2 * c.pr * (num(inp.coChPay)/100) * (coSO4P / 0.205);
      const liChKg = liC2 * LI_CONV * c.pr * (num(inp.liChPay)/100) * liCO3P;
      const totalCh = niChKg + coChKg + liChKg;
      const chEquiv = c.totContained > 0 ? (totalCh / c.totContained * 100) : NaN;
      const hasInputCh = num(inp.niChPay)>0 || num(inp.coChPay)>0 || num(inp.liChPay)>0;

      // ── 3시트 연산 ──
      const er3  = num(inp.exchangeRate);
      const coP3 = num(inp.coUSD) * 2.20462 * er3;
      const niP3 = num(inp.niUSD) / 1000 * er3;
      const liP3 = num(inp.liUSD) * er3;
      const pr3  = num(inp.powderRatio) / 100;
      const coC3 = num(inp.coContent) / 100;
      const niC3 = num(inp.niContent) / 100;
      const liC3 = num(inp.liContent) / 100;
      const cor3 = num(inp.coRecovery) / 100;
      const nir3 = num(inp.niRecovery) / 100;
      const lir3 = num(inp.liRecovery) / 100;

      const coCont3   = coC3 * pr3 * coP3;
      const niCont3   = niC3 * pr3 * niP3;
      const liCont3   = liC3 * LI_CONV * pr3 * liP3;
      const coNiCont3 = coCont3 + niCont3;
      const totCont3  = coNiCont3 + liCont3;

      const coOut3  = coC3 * pr3 * cor3;
      const niOut3  = niC3 * pr3 * nir3;
      const liOut3  = liC3 * LI_CONV * pr3 * lir3;
      const totOut3 = coOut3*coP3 + niOut3*niP3 + liOut3*liP3;
      const tgtMarginAmt3 = totOut3 * (num(inp.targetMargin)/100);

      const wetTotal3  = coOut3*num(inp.coWetCost) + niOut3*num(inp.niWetCost) + liOut3*num(inp.liWetCost);
      const preTreat3  = num(inp.preProcessCost);
      const logistics3 = num(inp.localLogistics);
      const intl3      = num(inp.intlLogistics) * pr3;
      const krLocal3   = num(inp.krLocalLogistics) * pr3;
      const calcin3    = num(inp.calcinationCost) * pr3;
      const other3     = num(inp.otherVarCost);
      const byproduct3 = num(inp.byproductRevenue);
      const totVar3    = wetTotal3 + preTreat3 + logistics3 + intl3 + krLocal3 + calcin3 + other3 - byproduct3;
      const maxPay3    = totOut3 - totVar3 - tgtMarginAmt3;

      const tgtCoNi3 = num(inp.s3TargetCoNi);
      const pool3    = coNiCont3 * (tgtCoNi3 / 100);

      let finalCoPay3 = num(inp.s3CoPay);
      let finalNiPay3 = num(inp.s3NiPay);
      let finalLiPay3 = num(inp.s3LiPay);

      const coPmt3_temp = coCont3 * (finalCoPay3 / 100);
      const niPmt3_temp = niCont3 * (finalNiPay3 / 100);
      const liPmt3_temp = liCont3 * (finalLiPay3 / 100);

      if (s3AutoTarget === "ni") {
        const niPmt3 = pool3 - coPmt3_temp - liPmt3_temp;
        finalNiPay3 = niCont3 > 0 ? (niPmt3 / niCont3) * 100 : 0;
      } else if (s3AutoTarget === "co") {
        const coPmt3 = pool3 - niPmt3_temp - liPmt3_temp;
        finalCoPay3 = coCont3 > 0 ? (coPmt3 / coCont3) * 100 : 0;
      } else if (s3AutoTarget === "li") {
        const liPmt3 = pool3 - coPmt3_temp - niPmt3_temp;
        finalLiPay3 = liCont3 > 0 ? (liPmt3 / liCont3) * 100 : 0;
      }

      const niNeg3 = finalNiPay3 < 0 || finalCoPay3 < 0 || finalLiPay3 < 0;
      const totPmt3 = (coCont3 * finalCoPay3/100) + (niCont3 * finalNiPay3/100) + (liCont3 * finalLiPay3/100);
      const cmB3   = maxPay3 - totPmt3;
      const trueMarginPct3 = totOut3 > 0 ? (cmB3 / totOut3) * 100 : 0;

      const saveS3 = (idx) => {
        if(!s3Name.trim()) { alert("저장할 이름을 입력해주세요."); return; }
        let n = [...s3Slots];
        n[idx] = { name: s3Name, coPay: finalCoPay3, niPay: finalNiPay3, liPay: finalLiPay3, trueMarginPct3: trueMarginPct3, s3TargetCoNi: inp.s3TargetCoNi, autoTarget: s3AutoTarget.toUpperCase() };
        setS3Slots(n); setS3Name("");
      };

      const loadS3 = (idx) => {
        if(!s3Slots[idx]) return;
        s("s3CoPay")(s3Slots[idx].coPay.toFixed(1));
        s("s3NiPay")(s3Slots[idx].niPay.toFixed(1));
        s("s3LiPay")(s3Slots[idx].liPay.toFixed(1));
        s("s3TargetCoNi")(s3Slots[idx].s3TargetCoNi);
        setS3AutoTarget(s3Slots[idx].autoTarget.toLowerCase());
      };

      const copyS3 = () => {

                        </div>
                        
                        <div style={{ padding:"12px 14px", background:"#EFF6FF", borderBottom:"1px solid "+C.border }}>
                          <div style={{ fontSize:12, fontWeight:700, color:C.blue, marginBottom:6 }}>🔄 자동 역산 메탈 선택 (잔여 풀 배분 대상)</div>
                          <div style={{ display:"flex", gap:15, fontSize:13 }}>
                            <label style={{ cursor:"pointer", fontWeight:s3AutoTarget==="ni"?700:400, color:s3AutoTarget==="ni"?C.blue:C.text }}><input type="radio" checked={s3AutoTarget === "ni"} onChange={() => setS3AutoTarget("ni")} style={{marginRight:4}} /> Ni 자동</label>
                            <label style={{ cursor:"pointer", fontWeight:s3AutoTarget==="co"?700:400, color:s3AutoTarget==="co"?C.amber:C.text }}><input type="radio" checked={s3AutoTarget === "co"} onChange={() => setS3AutoTarget("co")} style={{marginRight:4}} /> Co 자동</label>
                            <label style={{ cursor:"pointer", fontWeight:s3AutoTarget==="li"?700:400, color:s3AutoTarget==="li"?C.green:C.text }}><input type="radio" checked={s3AutoTarget === "li"} onChange={() => setS3AutoTarget("li")} style={{marginRight:4}} /> Li 자동</label>
                          </div>
                        </div>

                        <div style={{ padding:10, borderTop:"1px dashed "+C.border }}>
                          <div style={{ fontSize:11, fontWeight:700, marginBottom:4 }}>💾 시나리오 보관함 저장</div>
                          <input value={s3Name} onChange={e=>setS3Name(e.target.value)} placeholder="시나리오명 입력" style={{width:"100%", padding:6, fontSize:12, border:"1px solid "+C.border, borderRadius:4, marginBottom:6, outline:"none"}}/>
                          <div style={{ display:"grid", gridTemplateColumns:"repeat(5, 1fr)", gap:4 }}>
                            {[0,1,2,3,4].map(idx => <button key={idx} onClick={() => saveS3(idx)} style={{ padding:"6px 0", fontSize:11, fontWeight:700, cursor:"pointer", background:s3Slots[idx]?"#D1FAE5":"#E2E8F0", border:"1px solid "+(s3Slots[idx]?"#10B981":C.border), color:s3Slots[idx]?C.green:C.text, borderRadius:4 }}>S{idx+1}</button>)}
                          </div>
                        </div>
                      </div>
                    </div>

                    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                      <div style={{ background:C.card, borderRadius:10, border:"1px solid "+C.border, overflow:"hidden" }}>
                        <Sec label="⑤ 메탈별 계약 지불률 시뮬레이션" color={C.purple} />
                        
                        <IRow label="Co 지불률" value={inp.s3CoPay} onChange={s("s3CoPay")} unit="%" highlight={s3AutoTarget!=="co"} accent={s3AutoTarget==="co"} />
                        <div style={{ padding:"3px 10px 6px", background:C.secBg, fontSize:11, color:C.muted, borderBottom:"1px solid "+C.border }}>
                          {s3AutoTarget === "co" ? `🔄 자동 역산됨 (고정원가 기여: ${f0(coCont3 * finalCoPay3/100)}₩)` : `입력값 반영 원가: ${f0(coCont3 * finalCoPay3/100)}₩`}
                        </div>

                        <IRow label="Ni 지불률" value={inp.s3NiPay} onChange={s("s3NiPay")} unit="%" highlight={s3AutoTarget!=="ni"} accent={s3AutoTarget==="ni"} />
                        <div style={{ padding:"3px 10px 6px", background:C.secBg, fontSize:11, color:C.muted, borderBottom:"1px solid "+C.border }}>
                          {s3AutoTarget === "ni" ? `🔄 자동 역산됨 (고정원가 기여: ${f0(niCont3 * finalNiPay3/100)}₩)` : `입력값 반영 원가: ${f0(niCont3 * finalNiPay3/100)}₩`}
                        </div>

                        <IRow label="Li 지불률" value={inp.s3LiPay} onChange={s("s3LiPay")} unit="%" highlight={s3AutoTarget!=="li"} accent={s3AutoTarget==="li"} />
                        <div style={{ padding:"3px 10px 6px", background:C.secBg, fontSize:11, color:C.muted, borderBottom:"1px solid "+C.border }}>
                          {s3AutoTarget === "li" ? `🔄 자동 역산됨 (고정원가 기여: ${f0(liCont3 * finalLiPay3/100)}₩)` : `입력값 반영 원가: ${f0(liCont3 * finalLiPay3/100)}₩`}
                        </div>

                        <div style={{ padding:12, background:niNeg3?"#FEF2F2":"#ECFDF5", textAlign:"center", marginTop:10 }}>
                          <div style={{ fontSize:12, fontWeight:700, color:niNeg3?C.red:C.green }}>최종 계약서 기재용 확정 수치 요약</div>
                          <div style={{ fontSize:20, fontWeight:800, color:niNeg3?C.red:C.purple, marginTop:6 }}>
                            {niNeg3 ? "⚠ 역산 불가 (배분 한도 초과)" : `Co ${f1(finalCoPay3)}% / Ni ${f1(finalNiPay3)}% / Li ${f1(finalLiPay3)}%`}
                          </div>
                        </div>

                        <div style={{ margin:"12px", padding:"10px 12px", borderRadius:8, background:cmB3>=0?"#DCFCE7":"#FEF2F2", border:"1px solid "+(cmB3>=0?"#86EFAC":"#FECACA") }}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                            <div>
                              <div style={{ fontSize:11, color:C.muted }}>협상 성사 마진율</div>
                              <div style={{ fontSize:10, color:C.dim }}>최대허용매입단가 - 총지급액</div>
                            </div>
                            <div style={{ textAlign:"right" }}>
                              <div style={{ fontSize:22, fontWeight:800, color:cmB3>=0?C.green:C.red }}>
                                {f1(trueMarginPct3)} %
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div style={{ marginTop:14, background:C.card, padding:16, borderRadius:10, border:"1px solid "+C.border }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, borderBottom:"2px solid "+C.border, paddingBottom:6 }}>
                      <div style={{ fontSize:14, fontWeight:800, color:C.navy }}>📥 시뮬레이션 보관함</div>
                      <button onClick={copyS3} style={{ padding:"6px 14px", fontSize:12, fontWeight:700, background:"#1E293B", color:"#FFF", border:"none", borderRadius:4, cursor:"pointer" }}>📋 결과 복사 (전체 요약)</button>
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(180px, 1fr))", gap:10 }}>
                      {s3Slots.map((slot, idx) => (
                        <div key={idx} style={{ background:slot?"#F0FDF4":C.secBg, border:"1px solid "+C.border, borderRadius:8, padding:10 }}>
                          <div style={{ fontSize:12, fontWeight:800, color:C.blue, marginBottom:6 }}>슬롯 {idx+1} {slot ? `[${slot.name}]` : ""}</div>
                          {slot ? (
                            <div style={{ fontSize:11, lineHeight:1.5 }}>
                              <div>지불률: <b style={{color:C.purple}}>{f1(slot.coPay)}% / {f1(slot.niPay)}% / {f1(slot.liPay)}%</b></div>
                              <div style={{marginTop:2}}>마진율: <span style={{fontWeight:700, color:C.green}}>{f1(slot.trueMarginPct3)}%</span></div>
                              <button onClick={() => loadS3(idx)} style={{ width:"100%", marginTop:8, padding:"4px 0", fontSize:11, fontWeight:700, background:"#FFF", border:"1px solid "+C.border, borderRadius:4, cursor:"pointer" }}>🔄 불러오기</button>
                            </div>
                          ) : <div style={{ fontSize:11, color:C.dim, textAlign:"center", padding:"15px 0" }}>데이터 없음</div>}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* ━━━━ 4시트 ━━━━ */}
              {tab === 3 && (
                <div style={{ padding:14, display:"flex", flexDirection:"column", gap:14 }}>
                  <div className="sheet4-grid">
                    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                      <div style={{ background:C.card, borderRadius:10, border:"1px solid "+C.border, overflow:"hidden" }}>
                        <Sec label="① 금속 시세 (1시트 연동)" color={C.blue} />
                        <IRow label="기준 환율" value={inp.exchangeRate} onChange={s("exchangeRate")} unit="₩/$" accent />
                        <IRow label="Co 시세" value={inp.coUSD} onChange={s("coUSD")} unit="$/lb" />
                        <IRow label="Ni 시세" value={inp.niUSD} onChange={s("niUSD")} unit="$/ton" />
                        <IRow label="Li₂CO₃ 시세" value={inp.liUSD} onChange={s("liUSD")} unit="$/kg" />
                      </div>
                      <div style={{ background:C.card, borderRadius:10, border:"1px solid "+C.border, overflow:"hidden" }}>
                        <Sec label="② 원료 조건" color={C.blue} />
                        <IRow label="분말화비율" value={inp.s4PowderRatio} onChange={s("s4PowderRatio")} unit="%" />
                        <IRow label="Co 함량" value={inp.s4CoContent} onChange={s("s4CoContent")} unit="%" />
                        <IRow label="Ni 함량" value={inp.s4NiContent} onChange={s("s4NiContent")} unit="%" />
                        <IRow label="Li 함량" value={inp.s4LiContent} onChange={s("s4LiContent")} unit="%" />
                      </div>
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                      <div style={{ background:C.card, borderRadius:10, border:"1px solid "+C.border, overflow:"hidden" }}>
                        <Sec label="③ 우리 가공비 (USD 입력)" color={C.purple} />
                        <IRow label="제출 당시 환율" value={inp.s4OurEr} onChange={s("s4OurEr")} unit="₩/$" highlight />
                        <IRow label="Co 가공비" value={inp.s4CoWetUSD} onChange={s("s4CoWetUSD")} unit="$" />
                        <IRow label="Ni 가공비" value={inp.s4NiWetUSD} onChange={s("s4NiWetUSD")} unit="$" />
                        <IRow label="Li 가공비" value={inp.s4LiWetUSD} onChange={s("s4LiWetUSD")} unit="$" />
                        <CRow label="가공비 합계 (₩)" value={f0(ourWetKRW4)} unit="₩/kg" color={C.purple} bold />
                      </div>
                      <div style={{ background:C.card, borderRadius:10, border:"1px solid "+C.border, overflow:"hidden" }}>
                        <Sec label="④ 우리 최대 Payable Rate" color={C.green} />
                        <CRow label="Output 합계" value={f0(totOut4)} unit="₩/kg" color={C.green} />
                        <div style={{ background:"#0F172A", padding:"8px 12px", display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                          <div style={{ textAlign:"center" }}><div style={{ fontSize:10, color:"#94A3B8" }}>우리 최대 CoNi Rate</div><div style={{ fontSize:22, fontWeight:800, color:"#FCD34D" }}>{fp(ourCoNi4)}</div></div>
                          <div style={{ textAlign:"center" }}><div style={{ fontSize:10, color:"#94A3B8" }}>우리 최대 CoNiLi Rate</div><div style={{ fontSize:22, fontWeight:800, color:"#93C5FD" }}>{fp(ourCnli4)}</div></div>
                        </div>
                      </div>
                    </div>
                  </div>
                  
                  <div style={{ background:C.card, borderRadius:10, border:"1px solid "+C.border, overflow:"hidden", overflowX:"auto" }}>
                    <div style={{ padding:"10px 14px", background:"#1E293B", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div style={{ fontSize:13, fontWeight:700, color:"#F8FAFC" }}>⑤ 경쟁사 Payable Rate 역산</div>
                      <button onClick={addComp} style={{ padding:"6px 14px", background:"#1D4ED8", color:"#fff", border:"none", borderRadius:6, fontSize:12, fontWeight:600, cursor:"pointer" }}>+ 경쟁사 추가</button>
                    </div>
                    {comps.map((comp,i) => {
                      const compEr = num(comp.er); const pctN = num(comp.pct)/100;
                      const cpWetKRW = coOut4*(coWU4*pctN)*compEr + niOut4*(niWU4*pctN)*compEr + liOut4*(liWU4*pctN)*compEr;
                      const cpMax = totOut4 - cpWetKRW;
                      const cpCoNi = coNiCont4>0 ? (cpMax/coNiCont4)*100 : NaN;
                      return (
                        <div key={i} style={{ display:"grid", gridTemplateColumns:"minmax(120px, 1fr) 100px 100px 100px 100px 50px", gap:10, padding:10, borderBottom:"1px solid "+C.border, alignItems:"center", background:i%2===0?"#FFF":C.secBg }}>
                          <input value={comp.name} onChange={e=>updateComp(i,"name",e.target.value)} placeholder={`경쟁사 ${i+1}`} style={{padding:6, border:"1px solid "+C.border, borderRadius:4, outline:"none"}}/>
                          <input type="number" value={comp.er} onChange={e=>updateComp(i,"er",e.target.value)} placeholder="환율" style={{padding:6, border:"1px solid "+C.border, borderRadius:4, outline:"none"}}/>
                          <div style={{display:"flex", alignItems:"center"}}><input type="number" value={comp.pct} onChange={e=>updateComp(i,"pct",e.target.value)} style={{width:"100%", padding:6, border:"1.5px solid "+C.amber, borderRadius:4, outline:"none"}}/><span style={{marginLeft:4, fontSize:12}}>%</span></div>
                          <div style={{fontSize:12, fontWeight:700, color:cpWetKRW<ourWetKRW4?C.green:C.red}}>{f0(cpWetKRW)}₩</div>
                          <div><span style={{fontSize:16, fontWeight:800, color:(cpCoNi-ourCoNi4)>0?C.red:C.green}}>{fp(cpCoNi)}</span></div>
                          <button onClick={()=>removeComp(i)} style={{background:"transparent", border:"none", color:C.dim, cursor:"pointer", fontSize:16}}>✕</button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

            </div>
          </div>
        </FxCtx.Provider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
