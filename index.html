const { useState, useContext, createContext } = React;

const FxCtx = createContext({ openId: null, setOpenId: () => {} });
const LI_CONV = 73.89 / (2 * 6.941);

const f0 = n => (n == null || isNaN(n) || !isFinite(n)) ? "—" : Math.round(n).toLocaleString("ko-KR");
const fp = (n, d=1) => (n == null || isNaN(n) || !isFinite(n)) ? "—" : n.toFixed(d) + "%";
const fa = n => (n == null || isNaN(n) || !isFinite(n)) ? "—" : (n / 1e8).toFixed(1) + "억";
const num = v => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };

function compute(inp) {
  const er  = num(inp.exchangeRate);
  const coP = (num(inp.coUSD) / 0.453592) * er;
  const niP = (num(inp.niUSD) / 1000) * er;
  const liP = num(inp.liUSD) * er;
  const pr  = num(inp.powderRatio) / 100;
  const cor = num(inp.coRecovery) / 100;
  const nir = num(inp.niRecovery) / 100;
  const lir = num(inp.liRecovery) / 100;
  const coC = num(inp.coContent) / 100;
  const niC = num(inp.niContent) / 100;
  const liC = num(inp.liContent) / 100;

  const coOutKg = coC * pr * cor;
  const niOutKg = niC * pr * nir;
  const liOutKg = liC * LI_CONV * pr * lir;

  const coVal  = coOutKg * coP;
  const niVal  = niOutKg * niP;
  const liVal  = liOutKg * liP;
  const totOut = coVal + niVal + liVal;
  const coNiOut = coVal + niVal;

  const wetTotal = coOutKg * num(inp.coWetCost)
                 + niOutKg * num(inp.niWetCost)
                 + liOutKg * num(inp.liWetCost);

  const preV     = num(inp.preProcessCost);
  const localV   = num(inp.localLogistics);
  const intlV    = num(inp.intlLogistics);
  const krLocalV = num(inp.krLocalLogistics);
  const calcV    = num(inp.calcinationCost);
  const otherV   = num(inp.otherVarCost);
  const totVar   = preV + wetTotal + localV + intlV * pr + krLocalV * pr + calcV * pr + otherV;

  const payable      = totOut - totVar;
  const ratioCoNi    = coNiOut > 0 ? (payable / coNiOut) * 100 : NaN;
  const ratioCoNiLi  = totOut  > 0 ? (payable / totOut)  * 100 : NaN;

  const mktRatio    = num(inp.marketRatioCoNi);
  const marketPrice = coNiOut * (mktRatio / 100);
  const cmKg        = payable - marketPrice;
  const vol         = num(inp.monthlyVolume);
  const fixedCost   = num(inp.monthlyFixedCost) * 1e8;
  const cmMon       = cmKg * vol * 1000;
  const fixedPerKg  = fixedCost > 0 && vol > 0 ? fixedCost / (vol * 1000) : 0;
  const covPct      = fixedCost > 0 ? (cmMon / fixedCost) * 100 : NaN;

  return {
    coP, niP, liP, pr, coC, niC, liC, cor, nir, lir,
    coOutKg, niOutKg, liOutKg,
    coVal, niVal, liVal, totOut, coNiOut,
    wetTotal, preV, localV, intlV, krLocalV, calcV, otherV, totVar,
    payable, ratioCoNi, ratioCoNiLi,
    mktRatio, marketPrice, cmKg, cmMon, fixedCost, fixedPerKg, covPct,
  };
}

  return (

function Fx({ text }) {
  const { openId, setOpenId } = useContext(FxCtx);
  const open = openId === text;
  return (
    <span style={{ display: "inline-flex", alignItems: "center", marginLeft: 4, position: "relative" }}>
      <button onClick={e => { e.stopPropagation(); setOpenId(open ? null : text); }}
        style={{ fontSize: 9, padding: "0 5px", borderRadius: 3, cursor: "pointer",
          background: open ? "#1E3A8A" : "#0F172A", color: open ? "#93C5FD" : C.dim,
          border: "1px solid " + (open ? "#1E3A8A" : C.border) }}>
        fx
      </button>
      {open && (
        <span onClick={e => e.stopPropagation()}
          style={{ position: "absolute", top: "100%", left: 0, zIndex: 50, marginTop: 4,
            background: "#0D2137", border: "1px solid #1E3A8A", borderRadius: 6,
            padding: "7px 10px", fontSize: 10, color: "#93C5FD", width: 260,
            whiteSpace: "pre-wrap", lineHeight: 1.7, boxShadow: "0 6px 24px #000c" }}>
          {text}
        </span>
      )}
    </span>
  );
}

function IRow({ label, value, onChange, unit, note, tags, accent, highlight, formula }) {
  return (
    <div style={{ display: "flex", alignItems: "flex-start", gap: 4,
      padding: "6px 10px", borderBottom: "1px solid " + C.border,
      background: highlight ? "#1A1020" : accent ? "#14203A" : "transparent" }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 2, position: "relative" }}>
          <span style={{ fontSize: 11, color: "#94A3B8" }}>{label}</span>
          {tags && tags.map(t => <Tag key={t} t={t} />)}
          {formula && <Fx text={formula} />}
        </div>
        {note && <div style={{ fontSize: 9, color: C.vdim, marginTop: 1 }}>{note}</div>}
      </div>
      <input type="number" step="any" value={value} onChange={e => onChange(e.target.value)}
        style={{ width: 88, padding: "3px 7px", fontSize: 12, textAlign: "right",
          background: "#0A1628", color: "white", border: "1px solid #1E3A5F",
          borderRadius: 4, outline: "none", flexShrink: 0 }} />
      <div style={{ width: 44, fontSize: 10, color: C.dim, textAlign: "right",
        flexShrink: 0, paddingTop: 2 }}>{unit}</div>
    </div>
  );
}

function CRow({ label, value, unit, bold, color, sub, tags, formula }) {
  const col = color || (bold ? C.green : "#94A3B8");
  return (
    <div style={{ display: "flex", alignItems: "flex-start", gap: 4,
      padding: "5px 10px", borderBottom: "1px solid " + C.border,
      background: bold ? "#0A1E10" : "transparent" }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 2, position: "relative" }}>
          <span style={{ fontSize: 11, color: bold ? "#86EFAC" : C.muted,
            fontWeight: bold ? 700 : 400 }}>{label}</span>
          {tags && tags.map(t => <Tag key={t} t={t} />)}
          {formula && <Fx text={formula} />}
        </div>
        {sub && <div style={{ fontSize: 9, color: C.vdim, marginTop: 1 }}>{sub}</div>}
      </div>
      <div style={{ fontSize: bold ? 14 : 12, fontWeight: bold ? 700 : 500,
        color: col, minWidth: 88, textAlign: "right", flexShrink: 0 }}>{value}</div>
      <div style={{ width: 44, fontSize: 10, color: C.dim, textAlign: "right",
        flexShrink: 0, paddingTop: 2 }}>{unit}</div>
    </div>
  );
}

                    { label: "(-) 로컬 물류비",    val: f0(c.localV),            color: C.red,    minus: true },
                    { label: "(-) 국제 운임",      val: f0(c.intlV * c.pr),      color: C.red,    minus: true },
                    { label: "(-) 한국 로컬",      val: f0(c.krLocalV * c.pr),   color: C.red,    minus: true },
                    { label: "(-) 소성비용",       val: f0(c.calcV * c.pr),      color: C.red,    minus: true },
                    { label: "(-) 기타 변동비",    val: f0(c.otherV),            color: C.red,    minus: true },
                    { label: "(-) 목표 매입단가",  val: f0(tgtPayable),          color: C.amber,  minus: true },
                  ].map((r, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between",
                      padding: "5px 0", borderBottom: "1px solid " + C.border }}>
                      <span style={{ fontSize: 11, color: C.muted }}>{r.label}</span>
                      <span style={{ fontSize: 12, fontWeight: 500, color: r.color }}>
                        {r.minus ? "-" : ""}{r.val} ₩/kg
                      </span>
                    </div>
                  ))}
                  <div style={{ display: "flex", justifyContent: "space-between",
                    padding: "8px 0", borderTop: "2px solid #334155", marginTop: 2 }}>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: "#C4B5FD" }}>= 목표 가공비</div>
                      <div style={{ fontSize: 9, color: C.dim }}>Output - 기타변동비 - 목표매입단가</div>
                    </div>
                    <span style={{ fontSize: 18, fontWeight: 800,
                      color: allowedWet >= 0 ? C.purple : C.red }}>
                      {f0(allowedWet)} ₩/kg
                    </span>
                  </div>
                </div>

                <Sec label="⑤ 메탈별 목표 가공비" color={C.purple} />
                <div style={{ padding: "8px 10px" }}>
                  <div style={{ fontSize: 9, color: C.vdim, marginBottom: 6 }}>
                    비례 배분: 목표 단위가공비 = 현재 × (목표합계 ÷ 현재합계)
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "2fr 2fr 2fr 1.5fr",
                    gap: 2, marginBottom: 3 }}>
                    {["메탈", "현재 (₩/kg)", "목표 (₩/kg)", "절감률"].map((h, i) => (
                      <div key={i} style={{ fontSize: 9, fontWeight: 700, color: C.dim,
                        textAlign: i === 0 ? "left" : "right", padding: "2px 4px" }}>{h}</div>
                    ))}
                  </div>
                  {(() => {
                    const ratio = c.wetTotal > 0 ? allowedWet / c.wetTotal : 0;
                    return [
                      { name: "Co",      cur: num(inp.coWetCost), color: "#FCD34D" },
                      { name: "Ni",      cur: num(inp.niWetCost), color: "#93C5FD" },
                      { name: "Li₂CO₃", cur: num(inp.liWetCost), color: "#86EFAC" },
                    ].map(m => {
                      const goal = m.cur * ratio;
                      const pct  = m.cur > 0 ? ((goal - m.cur) / m.cur) * 100 : 0;
                      return (
                        <div key={m.name} style={{ display: "grid",
                          gridTemplateColumns: "2fr 2fr 2fr 1.5fr", gap: 2,
                          padding: "5px 4px", borderBottom: "1px solid " + C.border,
                          alignItems: "center" }}>
                          <div style={{ fontSize: 11, fontWeight: 600, color: m.color }}>{m.name}</div>
                          <div style={{ fontSize: 11, color: "#94A3B8", textAlign: "right" }}>{f0(m.cur)}</div>
                          <div style={{ fontSize: 12, fontWeight: 700, textAlign: "right",
                            color: allowedWet >= 0 ? C.purple : C.red }}>
                            {allowedWet >= 0 ? f0(goal) : "—"}
                          </div>
                          <div style={{ textAlign: "right" }}>
                            {allowedWet >= 0 && (
                              <span style={{ fontSize: 10, fontWeight: 700,
                                color: pct >= 0 ? C.green : C.red }}>
                                {pct >= 0 ? "+" : ""}{pct.toFixed(1)}%
                              </span>
                            )}
                          </div>
                        </div>
                      );
                    });
                  })()}
                  <div style={{ display: "grid", gridTemplateColumns: "2fr 2fr 2fr 1.5fr",
                    gap: 2, padding: "6px 4px", background: "#0A1E10",
                    borderRadius: "0 0 6px 6px", marginTop: 2 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#86EFAC" }}>합  계</div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", textAlign: "right" }}>{f0(c.wetTotal)}</div>
                    <div style={{ fontSize: 13, fontWeight: 800, textAlign: "right",
                      color: allowedWet >= 0 ? C.purple : C.red }}>{f0(allowedWet)}</div>
                    <div style={{ textAlign: "right" }}>
                      <span style={{ fontSize: 10, fontWeight: 700,
                        color: allowedWet >= c.wetTotal ? C.green : C.red }}>
                        {allowedWet >= c.wetTotal ? "✅ 가능" : "⚠ 절감"}
                      </span>
                    </div>
                  </div>
                  <div style={{ marginTop: 8, padding: "7px 10px", borderRadius: 6,
                    background: allowedWet >= c.wetTotal ? "#0A1E10" : "#1A0A0A",
                    border: "1px solid " + (allowedWet >= c.wetTotal ? "#14532D44" : "#7F1D1D44"),
                    display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 10, color: C.muted }}>합계 차이 (목표 - 현재)</span>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 14, fontWeight: 800,
                        color: allowedWet >= c.wetTotal ? C.green : C.red }}>
                        {allowedWet - c.wetTotal >= 0 ? "+" : ""}{f0(allowedWet - c.wetTotal)} ₩/kg
                      </div>
                      <div style={{ fontSize: 9, color: C.muted }}>
                        {allowedWet >= c.wetTotal ? "목표 달성 가능" : "원가 절감 필요"}
                      </div>
                    </div>
                  </div>
                </div>

                <Sec label="⑥ Payable Rate 요약" color={C.amber} />
                <div style={{ margin: "6px 10px 10px", padding: "12px 14px",
                  background: "#14100A", border: "1px solid #92400E44", borderRadius: 8 }}>
                  <div style={{ display: "flex", justifyContent: "space-between",
                    alignItems: "center", paddingBottom: 10,
                    borderBottom: "1px solid #1C1508", marginBottom: 10 }}>
                    <div>
                      <div style={{ fontSize: 11, fontWeight: 600, color: C.amber }}>Co+Ni 기준</div>
                      <div style={{ fontSize: 9, color: C.muted }}>목표 매입단가 ÷ Co+Ni가치</div>
                    </div>
                    <span style={{ fontSize: 28, fontWeight: 800, color: C.amber }}>{fp(tgtNum)}</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontSize: 11, fontWeight: 600, color: "#FCD34D" }}>Co+Ni+Li 기준 (중국)</div>
                      <div style={{ fontSize: 9, color: C.muted }}>목표 매입단가 ÷ Output합계</div>
                    </div>
                    <span style={{ fontSize: 28, fontWeight: 800, color: "#FCD34D" }}>{fp(tgtCoNiLi)}</span>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ══ 3시트: 참고 원가 분류 ══ */}
          {tab === 2 && (
            <div style={{ marginTop: 4 }}>
              <CostMapTab />
            </div>
          )}

          {/* 하단 주의사항 */}
          <div style={{ marginTop: 12, padding: "8px 14px", background: "#0A0F1A",
            borderRadius: 6, fontSize: 10, color: C.vdim, lineHeight: 1.8 }}>
            ⚠️ 습식가공비 = 변동분만 입력 (감가상각·고정인건비 제외) &nbsp;·&nbsp;
            Li 함량은 Li 금속 기준 (Li₂CO₃ 환산계수 5.323 자동 적용) &nbsp;·&nbsp;
            국제운임·한국로컬·소성비 = ₩/kg-BM 입력 → 분말화비율 자동 환산 &nbsp;·&nbsp;
            Payable Rate = 변동비 기준 최대 허용 지급률 (상한선)
          </div>

        </div>
      </div>
    </FxCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
    </script>
  </body>
</html>
