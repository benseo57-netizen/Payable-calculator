<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payable Rate 계산기</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body style="margin:0">
    <div id="root"></div>
    <script type="text/babel">
const { useState, useContext, createContext } = React;

const FxCtx = createContext({ openId: null, setOpenId: () => {} });
const LI_CONV = 73.89 / (2 * 6.941);

const f0 = n => (n == null || isNaN(n) || !isFinite(n)) ? "—" : Math.round(n).toLocaleString("ko-KR");
const fp = (n, d=1) => (n == null || isNaN(n) || !isFinite(n)) ? "—" : n.toFixed(d) + "%";
const fa = n => (n == null || isNaN(n) || !isFinite(n)) ? "—" : (n / 1e8).toFixed(1) + "억";
const num = v => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };

function compute(inp) {
  const er  = num(inp.exchangeRate);
  const coP = (num(inp.coUSD) / 0.453592) * er;
  const niP = (num(inp.niUSD) / 1000) * er;
  const liP = num(inp.liUSD) * er;
  const pr  = num(inp.powderRatio) / 100;
  const cor = num(inp.coRecovery) / 100;
  const nir = num(inp.niRecovery) / 100;
  const lir = num(inp.liRecovery) / 100;
  const coC = num(inp.coContent) / 100;
  const niC = num(inp.niContent) / 100;
  const liC = num(inp.liContent) / 100;
  const coOutKg = coC * pr * cor;
  const niOutKg = niC * pr * nir;
  const liOutKg = liC * LI_CONV * pr * lir;
  const coVal   = coOutKg * coP;
  const niVal   = niOutKg * niP;
  const liVal   = liOutKg * liP;
  const totOut  = coVal + niVal + liVal;
  const coNiOut = coVal + niVal;
  const wetTotal = coOutKg * num(inp.coWetCost)
                 + niOutKg * num(inp.niWetCost)
                 + liOutKg * num(inp.liWetCost);
  const preV     = num(inp.preProcessCost);
  const localV   = num(inp.localLogistics);
  const intlV    = num(inp.intlLogistics);
  const krLocalV = num(inp.krLocalLogistics);
  const calcV    = num(inp.calcinationCost);
  const otherV   = num(inp.otherVarCost);
  const totVar   = preV + wetTotal + localV + intlV*pr + krLocalV*pr + calcV*pr + otherV;
  const payable  = totOut - totVar;
  const ratioCoNi   = coNiOut > 0 ? (payable / coNiOut) * 100 : NaN;
  const ratioCoNiLi = totOut  > 0 ? (payable / totOut)  * 100 : NaN;
  const mktRatio    = num(inp.marketRatioCoNi);
  const marketPrice = coNiOut * (mktRatio / 100);
  const cmKg        = payable - marketPrice;
  const vol         = num(inp.monthlyVolume);
  const fixedCost   = num(inp.monthlyFixedCost) * 1e8;
  const cmMon       = cmKg * vol * 1000;
  const fixedPerKg  = fixedCost > 0 && vol > 0 ? fixedCost / (vol * 1000) : 0;
  const covPct      = fixedCost > 0 ? (cmMon / fixedCost) * 100 : NaN;
  return { coP, niP, liP, pr, coC, niC, liC, cor, nir, lir,
    coOutKg, niOutKg, liOutKg, coVal, niVal, liVal, totOut, coNiOut,
    wetTotal, preV, localV, intlV, krLocalV, calcV, otherV, totVar,
    payable, ratioCoNi, ratioCoNiLi, mktRatio, marketPrice,
    cmKg, cmMon, fixedCost, fixedPerKg, covPct };
}

const C = { bg:"#060E1C", card:"#0A1628", border:"#0F172A",
  amber:"#F59E0B", blue:"#38BDF8", green:"#4ADE80",
  red:"#F87171", purple:"#A78BFA", muted:"#475569", dim:"#334155", vdim:"#1E3A5F" };

const TAGS = {
  변동:    { bg:"#14532D", fg:"#4ADE80" },
  고정:    { bg:"#4C1D95", fg:"#A78BFA" },
  직접경비: { bg:"#134E4A", fg:"#5EEAD4" },
  간접경비: { bg:"#1E3A8A", fg:"#93C5FD" },
};

function Tag({ t }) {
  const d = TAGS[t];
  if (!d) return null;
  return (
    <span style={{ fontSize:9, fontWeight:700, padding:"1px 5px", borderRadius:3,
      background:d.bg, color:d.fg, marginLeft:3, flexShrink:0, whiteSpace:"nowrap" }}>
      {t}
    </span>
  );
}

function Sec({ label, color }) {
  return (
    <div style={{ padding:"6px 12px", marginTop:8, fontSize:10, fontWeight:700,
      letterSpacing:"0.07em", color:color||C.amber,
      borderLeft:"3px solid "+(color||C.amber), background:C.bg }}>
      {label}
    </div>
  );
}

function Fx({ text }) {
  const { openId, setOpenId } = useContext(FxCtx);
  const open = openId === text;
  return (
    <span style={{ display:"inline-flex", alignItems:"center", marginLeft:4, position:"relative" }}>
      <button onClick={e => { e.stopPropagation(); setOpenId(open ? null : text); }}
        style={{ fontSize:9, padding:"0 5px", borderRadius:3, cursor:"pointer",
          background:open?"#1E3A8A":"#0F172A", color:open?"#93C5FD":C.dim,
          border:"1px solid "+(open?"#1E3A8A":C.border) }}>fx</button>
      {open && (
        <span onClick={e => e.stopPropagation()}
          style={{ position:"absolute", top:"100%", left:0, zIndex:50, marginTop:4,
            background:"#0D2137", border:"1px solid #1E3A8A", borderRadius:6,
            padding:"7px 10px", fontSize:10, color:"#93C5FD", width:260,
            whiteSpace:"pre-wrap", lineHeight:1.7, boxShadow:"0 6px 24px #000c" }}>
          {text}
        </span>
      )}
    </span>
  );
}

function IRow({ label, value, onChange, unit, note, tags, accent, highlight, formula }) {
  return (
    <div style={{ display:"flex", alignItems:"flex-start", gap:4,
      padding:"6px 10px", borderBottom:"1px solid "+C.border,
      background:highlight?"#1A1020":accent?"#14203A":"transparent" }}>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:"flex", alignItems:"center", flexWrap:"wrap", gap:2, position:"relative" }}>
          <span style={{ fontSize:11, color:"#94A3B8" }}>{label}</span>
          {tags && tags.map(t => <Tag key={t} t={t} />)}
          {formula && <Fx text={formula} />}
        </div>
        {note && <div style={{ fontSize:9, color:C.vdim, marginTop:1 }}>{note}</div>}
      </div>
      <input type="number" step="any" value={value} onChange={e => onChange(e.target.value)}
        style={{ width:88, padding:"3px 7px", fontSize:12, textAlign:"right",
          background:"#0A1628", color:"white", border:"1px solid #1E3A5F",
          borderRadius:4, outline:"none", flexShrink:0 }} />
      <div style={{ width:44, fontSize:10, color:C.dim, textAlign:"right", flexShrink:0, paddingTop:2 }}>{unit}</div>
    </div>
  );
}

function CRow({ label, value, unit, bold, color, sub, tags, formula }) {
  const col = color||(bold?C.green:"#94A3B8");
  return (
    <div style={{ display:"flex", alignItems:"flex-start", gap:4,
      padding:"5px 10px", borderBottom:"1px solid "+C.border,
      background:bold?"#0A1E10":"transparent" }}>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:"flex", alignItems:"center", flexWrap:"wrap", gap:2, position:"relative" }}>
          <span style={{ fontSize:11, color:bold?"#86EFAC":C.muted, fontWeight:bold?700:400 }}>{label}</span>
          {tags && tags.map(t => <Tag key={t} t={t} />)}
          {formula && <Fx text={formula} />}
        </div>
        {sub && <div style={{ fontSize:9, color:C.vdim, marginTop:1 }}>{sub}</div>}
      </div>
      <div style={{ fontSize:bold?14:12, fontWeight:bold?700:500, color:col, minWidth:88, textAlign:"right", flexShrink:0 }}>{value}</div>
      <div style={{ width:44, fontSize:10, color:C.dim, textAlign:"right", flexShrink:0, paddingTop:2 }}>{unit}</div>
    </div>
  );
}

function LLayer({ text }) {
  return (
    <div style={{ margin:"8px 10px 0", padding:"2px 8px", fontSize:9,
      fontWeight:700, color:C.dim, letterSpacing:"0.08em", textTransform:"uppercase" }}>
      {text}
    </div>
  );
}

function CopyBtn({ c, inp }) {
  const [copied, setCopied] = useState(false);
  const handle = () => {
    const now = new Date().toLocaleDateString("ko-KR");
    const sig = c.cmKg < 0 ? "🔴 상한선 초과 — 변동비 미회수"
      : c.cmKg < c.fixedPerKg ? "🟡 유휴 캐파 범위에서 고정비 부분 흡수 — 매입 권장"
      : "✅ 유휴 캐파 범위에서 이 딜이 고정비 부담 완화에 기여";
    const lines = [
      "━━━━━━━━━━━━━━━━━━━━━━━",
      "📊 Payable Rate 분석 결과",
      "━━━━━━━━━━━━━━━━━━━━━━━",
      "",
      "【 원료 조건 】",
      `분말화비율: ${inp.powderRatio}%  /  Co: ${inp.coContent}%  Ni: ${inp.niContent}%  Li: ${inp.liContent}%`,
      `환율: ${Number(inp.exchangeRate).toLocaleString("ko-KR")} ₩/$  /  Co: $${inp.coUSD}/lb  Ni: $${inp.niUSD}/ton`,
      "",
      "【 Payable Rate 】",
      `Co+Ni 기준 (일반시장):   ${c.ratioCoNi.toFixed(1)}%`,
      `Co+Ni+Li 기준 (중국):    ${c.ratioCoNiLi.toFixed(1)}%`,
      `매입단가 (₩/kg 환산):    ${Math.round(c.payable).toLocaleString("ko-KR")} ₩/kg`,
      "",
      "【 공헌이익(CM) 분석 】",
      `시장 Payable Rate:       ${inp.marketRatioCoNi}%`,
      `kg당 CM:                 ${Math.round(c.cmKg).toLocaleString("ko-KR")} ₩/kg`,
      `kg당 고정비 부담:         ${Math.round(c.fixedPerKg).toLocaleString("ko-KR")} ₩/kg`,
      `이 딜 월 기여:            ${(c.cmMon/1e8).toFixed(1)}억원`,
      `고정비 커버율:            ${isNaN(c.covPct) ? "—" : c.covPct.toFixed(1)+"%"}`,
      "",
      "【 판단 】",
      sig,
      "",
      `※ 유휴 캐파 범위 기준 판단 도구 · ${now}`,
      "━━━━━━━━━━━━━━━━━━━━━━━",
    ].join("\n");
    navigator.clipboard.writeText(lines).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <button onClick={handle} style={{
      margin:"8px 10px", width:"calc(100% - 20px)",
      padding:"10px 0", borderRadius:8, cursor:"pointer",
      background:copied?"#14532D":"#0F2040",
      border:"1px solid "+(copied?"#4ADE80":"#1E3A5F"),
      color:copied?"#4ADE80":"#93C5FD",
      fontSize:12, fontWeight:700, fontFamily:"Arial",
      display:"flex", alignItems:"center", justifyContent:"center", gap:6,
    }}>
      {copied ? "✅  클립보드에 복사됨" : "📋  결과 복사 (슬랙·이메일·카톡용)"}
    </button>
  );
}

function CalcApp() {
  const [tab, setTab]   = useState(0);
  const [tgt, setTgt]   = useState("90");
  const [fxId, setFxId] = useState(null);
  const [inp, setInp]   = useState({
    exchangeRate:"1449.32",
    coUSD:"25.52", niUSD:"17133", liUSD:"18.72",
    powderRatio:"100",
    coContent:"2.57", niContent:"29.39", liContent:"4.16",
    coRecovery:"95", niRecovery:"90", liRecovery:"90",
    coWetCost:"13300", niWetCost:"11700", liWetCost:"9450",
    preProcessCost:"0", localLogistics:"22",
    intlLogistics:"0", krLocalLogistics:"0",
    calcinationCost:"0", otherVarCost:"0",
    marketRatioCoNi:"88", monthlyVolume:"800", monthlyFixedCost:"70",
  });

  const s = k => v => setInp(p => ({ ...p, [k]: v }));
  const c = compute(inp);
  const tgtNum     = num(tgt);
  const tgtPayable = c.coNiOut * (tgtNum / 100);
  const allowedWet = c.totOut - tgtPayable
    - num(inp.preProcessCost) - num(inp.localLogistics)
    - num(inp.intlLogistics) * c.pr - num(inp.krLocalLogistics) * c.pr
    - num(inp.calcinationCost) * c.pr - num(inp.otherVarCost);
  const tgtCoNiLi = c.totOut > 0 ? (tgtPayable / c.totOut) * 100 : NaN;
  const cmOk  = c.cmKg >= 0;
  const cmCol = cmOk ? C.green : C.red;
  const sig   = c.cmKg < 0 ? "red" : c.cmKg < c.fixedPerKg ? "amber" : "green";
  const sigCol = sig==="green" ? C.green : sig==="amber" ? C.amber : C.red;

  return (
    <FxCtx.Provider value={{ openId:fxId, setOpenId:setFxId }}>
      <div onClick={() => setFxId(null)}
        style={{ fontFamily:"'Apple SD Gothic Neo',Arial,sans-serif",
          background:C.bg, minHeight:"100vh", color:"white" }}>

        <div style={{ padding:"14px 20px", background:C.card, borderBottom:"1px solid "+C.border }}>
          <div style={{ fontSize:9, letterSpacing:"0.15em", color:C.dim, textTransform:"uppercase" }}>원료 매입 단가 분석</div>
          <div style={{ fontSize:18, fontWeight:800, marginTop:2 }}>CM 기반 Payable Rate 계산기</div>
          <div style={{ fontSize:10, color:C.dim, marginTop:4 }}>
            변동비만 차감 · Payable Rate = 변동비 기준 최대 허용 지급률(상한선) · 유휴 캐파 범위 판단 도구 · fx = 산식 보기
          </div>
        </div>

        <div style={{ display:"flex", background:C.card, borderBottom:"1px solid "+C.border }}>
          {["1시트  Payable Rate 계산","2시트  목표 가공비 역산"].map((t,i) => (
            <button key={i} onClick={() => setTab(i)}
              style={{ padding:"11px 20px", fontSize:11, fontWeight:600, cursor:"pointer",
                border:"none", background:"transparent",
                color:tab===i?C.amber:C.dim,
                borderBottom:tab===i?"2px solid "+C.amber:"2px solid transparent" }}>
              {t}
            </button>
          ))}
        </div>

        <div style={{ maxWidth:980, margin:"0 auto", padding:14 }}>

          {tab === 0 && (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>

              <div style={{ background:C.card, borderRadius:10, overflow:"hidden", border:"1px solid "+C.border }}>
                <Sec label="① 환율" />
                <IRow label="환율" value={inp.exchangeRate} onChange={s("exchangeRate")} unit="₩/$" />

                <Sec label="② 금속 시세" color={C.blue} />
                <IRow label="Co 시세" value={inp.coUSD} onChange={s("coUSD")} unit="$/lb" />
                <CRow label="Co 환산가" value={f0(c.coP)} unit="₩/kg" color={C.blue}
                  formula={"Co $/lb ÷ 0.453592 × 환율\n= "+inp.coUSD+" ÷ 0.453592 × "+inp.exchangeRate} />
                <IRow label="Ni 시세" value={inp.niUSD} onChange={s("niUSD")} unit="$/ton" />
                <CRow label="Ni 환산가" value={f0(c.niP)} unit="₩/kg" color={C.blue}
                  formula={"Ni $/ton ÷ 1,000 × 환율\n= "+inp.niUSD+" ÷ 1000 × "+inp.exchangeRate} />
                <IRow label="Li₂CO₃ 시세" value={inp.liUSD} onChange={s("liUSD")} unit="$/kg" />
                <CRow label="Li₂CO₃ 환산가" value={f0(c.liP)} unit="₩/kg" color={C.blue}
                  formula={"Li $/kg × 환율\n= "+inp.liUSD+" × "+inp.exchangeRate} />

                <Sec label="③ 원료 분석" color={C.blue} />
                <IRow label="분말화비율" value={inp.powderRatio} onChange={s("powderRatio")} unit="%"
                  note="BM=100% · 양극스크랩≈80% · 젤리롤≈75% · 셀≈60%"
                  formula={"스크랩 종류별 BM 전환율\n= BM(kg) ÷ 스크랩(kg) × 100"} />
                <IRow label="Co 함량" value={inp.coContent} onChange={s("coContent")} unit="%" />
                <IRow label="Ni 함량" value={inp.niContent} onChange={s("niContent")} unit="%" />
                <IRow label="Li 함량" value={inp.liContent} onChange={s("liContent")} unit="%"
                  note="Li 금속 기준 (Li₂CO₃ 환산계수 5.323 자동 적용)" />

                <Sec label="④ 습식 회수율" color={C.blue} />
                <IRow label="Co 회수율" value={inp.coRecovery} onChange={s("coRecovery")} unit="%" />
                <IRow label="Ni 회수율" value={inp.niRecovery} onChange={s("niRecovery")} unit="%" />
                <IRow label="Li₂CO₃ 회수율" value={inp.liRecovery} onChange={s("liRecovery")} unit="%" />

                <Sec label="⑤ 습식가공비 (변동분만)" color={C.purple} />
                <div style={{ padding:"3px 10px", fontSize:9, color:"#4C1D95" }}>₩/kg-제품 기준 · 고정비(감가·고정인건비) 제외</div>
                <IRow label="Co 습식가공비" value={inp.coWetCost} onChange={s("coWetCost")} unit="₩/kg"
                  tags={["변동","직접경비"]} accent />
                <IRow label="Ni 습식가공비" value={inp.niWetCost} onChange={s("niWetCost")} unit="₩/kg"
                  tags={["변동","직접경비"]} accent />
                <IRow label="Li₂CO₃ 습식가공비" value={inp.liWetCost} onChange={s("liWetCost")} unit="₩/kg"
                  tags={["변동","직접경비"]} accent />
                <CRow label="총 습식가공비 (원료 kg당)" value={f0(c.wetTotal)} unit="₩/kg" color={C.purple} bold
                  formula={"Co_out×Co가공비 + Ni_out×Ni가공비 + Li_out×Li가공비\nCo_out = Co함량×분말화×Co회수율\n= "+inp.coContent+"% × "+inp.powderRatio+"% × "+inp.coRecovery+"% = "+(c.coOutKg*1000).toFixed(2)+" g/kg"} />

                <Sec label="⑥ 물류 · 소성 · 기타 변동비" color={C.red} />
                <IRow label="전처리 변동비" value={inp.preProcessCost} onChange={s("preProcessCost")} unit="₩/kg"
                  tags={["변동","직접경비"]} note="₩/kg-스크랩 기준 · BM 직매입=0" accent />
                <IRow label="로컬 물류비" value={inp.localLogistics} onChange={s("localLogistics")} unit="₩/kg"
                  tags={["변동","간접경비"]} note="₩/kg-입력원료 기준 · 스크랩/BM 무관"
                  formula="입력원료 1kg당 운임, 그대로 적용" />
                <IRow label="국제 운임 (CIF 부산)" value={inp.intlLogistics} onChange={s("intlLogistics")} unit="₩/kg-BM"
                  tags={["변동","간접경비"]} note="₩/kg-BM 기준 · 해외→부산 · 불필요시 0"
                  formula={"예) 컨테이너 $5,000 ÷ BM 20,000kg = $0.25/kg-BM\n자동환산: ×분말화비율"} />
                <IRow label="한국 로컬 (부산→군산)" value={inp.krLocalLogistics} onChange={s("krLocalLogistics")} unit="₩/kg-BM"
                  tags={["변동","간접경비"]} note="₩/kg-BM 기준 · 불필요시 0"
                  formula="자동환산: ×분말화비율" />
                <IRow label="소성비용 (군산)" value={inp.calcinationCost} onChange={s("calcinationCost")} unit="₩/kg-BM"
                  tags={["변동","직접경비"]} note="₩/kg-BM 기준 · BM 전용 · 불필요시 0"
                  formula="자동환산: ×분말화비율" />
                <IRow label="기타 변동비" value={inp.otherVarCost} onChange={s("otherVarCost")} unit="₩/kg"
                  tags={["변동"]} />
              </div>

              <div style={{ background:C.card, borderRadius:10, overflow:"hidden", border:"1px solid "+C.border }}>
                <Sec label="Output 가치 (회수 후)" color={C.green} />
                <CRow label="Co 가치" value={f0(c.coVal)} unit="₩/kg"
                  sub={"output "+(c.coOutKg*1000).toFixed(1)+" g/kg-원료"}

                        <div key={m.name} style={{ display:"grid",

                          </div>
                        </div>
                      );
                    });
                  })()}
                  <div style={{ display:"grid", gridTemplateColumns:"2fr 2fr 2fr 1.5fr", gap:2,

                      <div style={{ fontSize:14, fontWeight:800,
                        color:allowedWet>=c.wetTotal?C.green:C.red }}>

                      </div>
                      <div style={{ fontSize:9, color:C.muted }}>
                        {allowedWet>=c.wetTotal?"목표 달성 가능":"원가 절감 필요"}
                      </div>
                    </div>
                  </div>
                </div>

                <Sec label="⑥ Payable Rate 요약" color={C.amber} />
                <div style={{ margin:"6px 10px 10px", padding:"12px 14px",
                  background:"#14100A", border:"1px solid #92400E44", borderRadius:8 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                    paddingBottom:10, borderBottom:"1px solid #1C1508", marginBottom:10 }}>
                    <div>
                      <div style={{ fontSize:11, fontWeight:600, color:C.amber }}>Co+Ni 기준</div>
                      <div style={{ fontSize:9, color:C.muted }}>목표 매입단가 ÷ Co+Ni가치</div>
                    </div>
                    <span style={{ fontSize:28, fontWeight:800, color:C.amber }}>{fp(tgtNum)}</span>
                  </div>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div>
                      <div style={{ fontSize:11, fontWeight:600, color:"#FCD34D" }}>Co+Ni+Li 기준 (중국)</div>
                      <div style={{ fontSize:9, color:C.muted }}>목표 매입단가 ÷ Output합계</div>
                    </div>
                    <span style={{ fontSize:28, fontWeight:800, color:"#FCD34D" }}>{fp(tgtCoNiLi)}</span>
                  </div>
                </div>
              </div>
            </div>
          )}

          <div style={{ marginTop:12, padding:"8px 14px", background:"#0A0F1A",
            borderRadius:6, fontSize:10, color:C.vdim, lineHeight:1.8 }}>
            ⚠️ 습식가공비 = 변동분만 입력 (감가상각·고정인건비 제외) &nbsp;·&nbsp;
            Li 함량은 Li 금속 기준 (Li₂CO₃ 환산계수 5.323 자동 적용) &nbsp;·&nbsp;
            국제운임·한국로컬·소성비 = ₩/kg-BM 입력 → 분말화비율 자동 환산 &nbsp;·&nbsp;
            Payable Rate = 변동비 기준 최대 허용 지급률(상한선) · 유휴 캐파 범위에서 판단 도구로 활용
          </div>

        </div>
      </div>
    </FxCtx.Provider>
  );
}

        ※ 하나의 비용은 세 가지 관점의 이름을 동시에 가집니다 &nbsp;·&nbsp;
        예) 약품비 = <span style={{color:"#4ADE80"}}>변동비</span> + <span style={{color:"#5EEAD4"}}>직접비</span> + <span style={{color:"#7DD3FC"}}>매출원가</span> &nbsp;·&nbsp;
        감가상각비 = <span style={{color:"#A78BFA"}}>고정비</span> + <span style={{color:"#93C5FD"}}>간접비</span> + <span style={{color:"#7DD3FC"}}>매출원가/판관비 (어디 자산이냐에 따라)</span>
      </div>
    </div>
  );
}



function App() {
  const [mainTab, setMainTab] = useState(0);
  return (
    <div style={{ margin:0, padding:0 }}>
      <div style={{ display:"flex", background:"#0A1628",
        borderBottom:"1px solid #0F172A",
        position:"sticky", top:0, zIndex:100 }}>
        {["📊  계산기","📚  원가 분류 참고"].map((t,i) => (
          <button key={i} onClick={() => setMainTab(i)} style={{
            padding:"12px 24px", fontSize:12, fontWeight:700, cursor:"pointer",
            border:"none", background:"transparent",
            color:mainTab===i?"#F59E0B":"#334155",
            borderBottom:mainTab===i?"2px solid #F59E0B":"2px solid transparent"
          }}>{t}</button>
        ))}
      </div>
      {mainTab === 0 && <CalcApp />}
      {mainTab === 1 && <div style={{ padding:20 }}><CostMapApp /></div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
    </script>
  </body>
</html>
