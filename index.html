<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024">
  <title>Payable Rate 계산기 (Professional)</title>
  
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <style>
    body { margin: 0; padding: 0; background-color: #F0F4F8; }
    * { box-sizing: border-box; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    button { outline: none; }
  </style>
  <script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
        e.preventDefault();
      }
    });
  </script>  
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useContext, createContext } = React;
    const FxCtx = createContext({ openId: null, setOpenId: () => {} });
    const LI_CONV = 1 / 0.188;  
    const f0 = n => (n == null || isNaN(n) || !isFinite(n)) ? "—" : Math.round(n).toLocaleString("ko-KR");
    const fp = (n, d=0) => (n == null || isNaN(n) || !isFinite(n)) ? "—" : n.toFixed(d) + "%";
    const num = v => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };

    function compute(inp) {
      const er  = num(inp.exchangeRate);
      const coP = num(inp.coUSD) * 2.20462 * er;  
      const niP = (num(inp.niUSD) / 1000) * er;
      const liP = num(inp.liUSD) * er;
      const pr  = num(inp.powderRatio) / 100;
      const cor = num(inp.coRecovery) / 100;
      const nir = num(inp.niRecovery) / 100;
      const lir = num(inp.liRecovery) / 100;
      const coC = num(inp.coContent) / 100;
      const niC = num(inp.niContent) / 100;
      const liC = num(inp.liContent) / 100;
      const coOut = coC * pr * cor;
      const niOut = niC * pr * nir;
      const liOut = liC * LI_CONV * pr * lir;
      const coVal = coOut * coP;
      const niVal = niOut * niP;
      const liVal = liOut * liP;
      const totOut = coVal + niVal + liVal;
      const coContained = coC * pr * coP;
      const niContained = niC * pr * niP;
      const liContained = liC * LI_CONV * pr * liP;
      const coNiContained = coContained + niContained;
      const totContained = coContained + niContained + liContained;
      const wetTotal = coOut * num(inp.coWetCost) + niOut * num(inp.niWetCost) + liOut * num(inp.liWetCost);
      const totVar = num(inp.preProcessCost) + wetTotal + num(inp.localLogistics) + num(inp.intlLogistics)*pr + num(inp.krLocalLogistics)*pr + num(inp.calcinationCost)*pr + num(inp.otherVarCost);
      const tgtMarginAmt = totOut * (num(inp.targetMargin) / 100);
      const payable = totOut - totVar + num(inp.byproductRevenue) - tgtMarginAmt;
      const ratioCoNi = coNiContained > 0 ? (payable / coNiContained) * 100 : NaN;
      const ratioCoNiLi = totContained > 0 ? (payable / totContained) * 100 : NaN;
      const cmKg = payable - (coNiContained * (num(inp.marketRatioCoNi) / 100));
      return { coP, niP, liP, pr, coOut, niOut, liOut, coVal, niVal, liVal, totOut, coContained, niContained, liContained, coNiContained, totContained, wetTotal, totVar, payable, tgtMarginAmt, ratioCoNi, ratioCoNiLi, cmKg };
    }

    const C = { bg: "#F0F4F8", card: "#FFFFFF", border: "#CBD5E1", amber: "#B45309", blue: "#1D4ED8", green: "#065F46", red: "#B91C1C", purple: "#6D28D9", navy: "#0F172A", text: "#0F172A", muted: "#475569", dim: "#94A3B8" };

    function Sec({ label, color }) { return <div style={{ padding:"6px 12px", marginTop:8, fontSize:12, fontWeight:700, color:color||C.amber, borderLeft:"3px solid "+(color||C.amber), background:"#F8FAFC", borderBottom:"1px solid "+C.border }}>{label}</div>; }
    function IRow({ label, value, onChange, unit, note, accent, highlight }) { return <div style={{ display:"flex", alignItems:"flex-start", gap:4, padding:"6px 10px", borderBottom:"1px solid "+C.border, background:highlight?"#FFFBEB":accent?"#EFF6FF":"#FFFFFF" }}><div style={{ flex:1 }}><div style={{ fontSize:13, color:C.text, fontWeight:500 }}>{label}</div>{note && <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{note}</div>}</div><input type="number" step="any" value={value} onChange={e => onChange(e.target.value)} style={{ width:88, padding:"3px 7px", fontSize:14, textAlign:"right", border:"1.5px solid #94A3B8", borderRadius:4, outline:"none" }} /><div style={{ width:44, fontSize:11, color:C.dim, textAlign:"right", paddingTop:2 }}>{unit}</div></div>; }
    function CRow({ label, value, unit, bold, color, sub }) { return <div style={{ display:"flex", alignItems:"flex-start", gap:4, padding:"5px 10px", borderBottom:"1px solid "+C.border, background:bold?"#ECFDF5":"transparent" }}><div style={{ flex:1 }}><div style={{ fontSize:13, color:bold?"#065F46":C.text, fontWeight:bold?700:400 }}>{label}</div>{sub && <div style={{ fontSize:11, color:C.muted, marginTop:1 }}>{sub}</div>}</div><div style={{ fontSize:bold?14:12, fontWeight:bold?700:500, color:color||(bold?C.green:"#94A3B8"), minWidth:88, textAlign:"right" }}>{value}</div><div style={{ width:44, fontSize:11, color:C.dim, textAlign:"right", paddingTop:2 }}>{unit}</div></div>; }

    function App() {
      const [tab, setTab] = useState(0);
      const [inp, setInp] = useState({
        exchangeRate:"1530.11", coUSD:"25.53", niUSD:"17650", liUSD:"22.50",
        powderRatio:"100", coContent:"3.0", niContent:"25.0", liContent:"3.5",
        coRecovery:"95", niRecovery:"95", liRecovery:"90",
        coWetCost:"13300", niWetCost:"11700", liWetCost:"9450",
        preProcessCost:"0", localLogistics:"0", intlLogistics:"0", krLocalLogistics:"0",
        calcinationCost:"0", otherVarCost:"0", byproductRevenue:"0", targetMargin:"0",
        marketRatioCoNi:"105", s3TargetCoNi:"90", s3CoPay:"15", s3LiPay:"20"
      });
      const s = k => v => setInp(p => ({ ...p, [k]: v }));
      const c = compute(inp);
      
      return (
        <div style={{ fontFamily:"sans-serif", background:C.bg, minHeight:"100vh" }}>
          <div style={{ padding:"14px 20px", background:C.navy, color:"#FFF" }}>
            <div style={{ fontSize:11, letterSpacing:"0.1em", color:C.dim }}>PROFESSIONAL TOOL</div>
            <div style={{ fontSize:20, fontWeight:800 }}>Payable Rate 계산기 (6월 업데이트)</div>
          </div>
          <div style={{ display:"flex", background:"#FFF", borderBottom:"2px solid "+C.border }}>
            {["1. 기본 계산","2. 목표 역산","3. 스크랩","4. 경쟁사 분석"].map((t,i) => (
              <button key={i} onClick={() => setTab(i)} style={{ padding:"11px 20px", border:"none", background:"transparent", color:tab===i?C.amber:C.muted, fontWeight:tab===i?700:500, borderBottom:tab===i?"2px solid "+C.amber:"none", cursor:"pointer" }}>{t}</button>
            ))}
          </div>
          <div style={{ maxWidth:980, margin:"0 auto", padding:14 }}>
            {tab === 0 && (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14 }}>
                <div style={{ background:"#FFF", borderRadius:10, border:"1px solid "+C.border, overflow:"hidden" }}>
                  <Sec label="1. 시장 환경" />
                  <IRow label="환율" value={inp.exchangeRate} onChange={s("exchangeRate")} unit="₩/$" accent />
                  <IRow label="Co 시세" value={inp.coUSD} onChange={s("coUSD")} unit="$/lb" />
                  <IRow label="Ni 시세" value={inp.niUSD} onChange={s("niUSD")} unit="$/ton" />
                  <IRow label="Li 시세" value={inp.liUSD} onChange={s("liUSD")} unit="$/kg" />
                  <Sec label="2. 원료 및 가공" color={C.blue} />
                  <IRow label="Co 함량" value={inp.coContent} onChange={s("coContent")} unit="%" />
                  <IRow label="Ni 함량" value={inp.niContent} onChange={s("niContent")} unit="%" />
                  <IRow label="Li 함량" value={inp.liContent} onChange={s("liContent")} unit="%" />
                </div>
                <div style={{ background:"#FFF", borderRadius:10, border:"1px solid "+C.border, overflow:"hidden" }}>
                  <Sec label="3. 가치 분석" color={C.green} />
                  <CRow label="Output 합계" value={f0(c.totOut)} unit="₩/kg" bold />
                  <CRow label="Co+Ni 함량가치" value={f0(c.coNiContained)} unit="₩/kg" color={C.blue} />
                  <CRow label="전체 함량가치" value={f0(c.totContained)} unit="₩/kg" />
                  <Sec label="4. 비용 및 마진" color={C.red} />
                  <IRow label="목표 마진율" value={inp.targetMargin} onChange={s("targetMargin")} unit="%" highlight />
                </div>
                <div style={{ background:C.navy, borderRadius:12, padding:20, color:"#FFF" }}>
                  <div style={{ fontSize:12, color:C.dim, marginBottom:10 }}>PAYABLE RATE RESULT</div>
                  <div style={{ fontSize:14, fontWeight:700, color:C.amber }}>Co+Ni 기준</div>
                  <div style={{ fontSize:36, fontWeight:800, color:C.amber, marginBottom:20 }}>{fp(c.ratioCoNi, 1)}</div>
                  <div style={{ fontSize:14, fontWeight:700, color:C.dim }}>Co+Ni+Li 기준</div>
                  <div style={{ fontSize:36, fontWeight:800, color:C.dim }}>{fp(c.ratioCoNiLi, 1)}</div>
                </div>
              </div>
            )}
            {tab === 3 && (
              <div style={{ background:"#FFF", padding:20, borderRadius:10, border:"1px solid "+C.border }}>
                <div style={{ fontSize:16, fontWeight:700, marginBottom:10 }}>경쟁사 Payable Rate 시뮬레이션</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:10, background:"#F1F5F9", padding:10, fontWeight:700, fontSize:12 }}>
                  <div>경쟁사명</div><div>적용환율</div><div>가공비 비율</div><div>결과 Rate</div>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:10, padding:10, borderBottom:"1px solid "+C.border }}>
                  <div style={{fontWeight:700}}>성일 (기준)</div><div>{inp.exchangeRate}</div><div>100%</div><div style={{color:C.amber, fontWeight:800}}>{fp(c.ratioCoNi, 1)}</div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
