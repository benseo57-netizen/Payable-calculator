<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payable Rate 계산기</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #F0F4F8;
    }
    #app-frame {
      width: 100%; height: 100vh; border: none; display: block;
    }
    /* 로딩 중 보여줄 화면 (iframe 로드 전 깜빡임 방지) */
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px; font-family: 'Apple SD Gothic Neo', Arial, sans-serif;
      color: #475569; background: #F0F4F8; z-index: 10;
    }
    #loading.hide { display: none; }
    .spinner {
      width: 28px; height: 28px; border: 3px solid #CBD5E1; border-top-color: #1D4ED8;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <div>불러오는 중...</div>
  </div>

  <!--
    ⚠️ 아래 src 주소를 본인의 앱스스크립트 "웹 앱" 배포 URL로 교체하세요.
    (앱스스크립트 편집기 → 배포 → 배포 관리 → 웹 앱 URL 복사)
    형태 예시: https://script.google.com/macros/s/AKfycb.../exec
  -->
  <iframe
    id="app-frame"
    src="https://script.google.com/macros/s/REPLACE_WITH_YOUR_DEPLOYMENT_ID/exec"
    onload="document.getElementById('loading').classList.add('hide')"
    allow="clipboard-write"
  ></iframe>

</body>
</html>
